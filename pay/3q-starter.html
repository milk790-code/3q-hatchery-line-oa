<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>3Q 孵化所｜入門啟動包付款</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #5f6368;
      --paper: #f8f4ec;
      --panel: #ffffff;
      --line: #d9cdbb;
      --gold: #b9852f;
      --green: #197b57;
      --red: #b3261e;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.55;
      color: var(--ink);
      background: var(--paper);
    }

    .page {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
      gap: clamp(28px, 5vw, 64px);
      align-items: center;
      padding: clamp(20px, 5vw, 56px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(28px, 5vw, 56px);
    }

    .brand img {
      width: 132px;
      height: auto;
      display: block;
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 14px;
      color: var(--green);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 680px;
      font-size: clamp(40px, 6vw, 76px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lead {
      margin: 22px 0 0;
      max-width: 580px;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 21px);
    }

    .visual {
      width: min(520px, 100%);
      margin-top: 32px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      aspect-ratio: 16 / 10;
      background: #e7dfd2;
    }

    .visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .checkout {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: clamp(22px, 4vw, 32px);
      box-shadow: 0 18px 42px rgba(38, 24, 8, .12);
    }

    .checkout h2 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .price {
      margin: 0 0 22px;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .price small {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .items {
      margin: 0 0 24px;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
      color: #343434;
    }

    .items li {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .items img {
      width: 20px;
      height: 20px;
      margin-top: 2px;
    }

    button {
      appearance: none;
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: .68;
    }

    .status {
      min-height: 24px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    .fine {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .page {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .brand { margin-bottom: 32px; }
      .visual { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section>
      <div class="brand">
        <img src="../assets/logo/logo-horizontal.svg" alt="3Q Hatchery">
      </div>
      <p class="eyebrow">LINE 官號成交基礎建設</p>
      <h1>先把第一個付款路徑接起來。</h1>
      <p class="lead">入門啟動包會把品牌策略診斷、LINE 官方帳號基礎建置與第一個月陪跑集中在同一個可落地入口。</p>
      <div class="visual" aria-hidden="true">
        <img src="../assets/photography/ai/3q-ai-cover-bowl-1080x878.png" alt="">
      </div>
    </section>

    <section class="checkout" aria-labelledby="checkout-title">
      <h2 id="checkout-title">3Q 孵化所・入門啟動包</h2>
      <p class="price">NT$1,280 <small>信用卡付款</small></p>
      <ul class="items">
        <li><img src="../assets/icons/phosphor/lightbulb-thin.svg" alt=""><span>品牌策略診斷：釐清現在最該先賣什麼。</span></li>
        <li><img src="../assets/icons/line.svg" alt=""><span>LINE 官方帳號基礎建置：選單、回覆、付款入口。</span></li>
        <li><img src="../assets/icons/phosphor/handshake-thin.svg" alt=""><span>第一個月陪跑：把詢問導向可成交的下一步。</span></li>
      </ul>
      <button id="checkout-button" type="button">立即付款啟動</button>
      <p id="checkout-status" class="status" role="status"></p>
      <p class="fine">付款由 cdg-core-eyes 串接 ECPay。若頁面無法建立付款，請回 LINE 訊息，我們會人工接上。</p>
    </section>
  </main>

  <script src="../assets/checkout/cdg-core-eyes-checkout.js"></script>
  <script>
    (function () {
      var button = document.getElementById('checkout-button');
      var status = document.getElementById('checkout-status');
      var params = new URLSearchParams(window.location.search);
      var ref = params.get('ref') || '';

      function setStatus(text, type) {
        status.textContent = text;
        status.className = 'status' + (type ? ' ' + type : '');
      }

      if (params.get('paid') === '1') {
        setStatus('已回到 3Q 付款頁。若剛完成付款，我們會用 LINE 確認後續。', 'ok');
      }

      button.addEventListener('click', async function () {
        button.disabled = true;
        button.textContent = '建立付款頁中...';
        setStatus('');
        try {
          await window.CdgCoreEyesCheckout.submit({
            brand: '3q',
            items: [{ name: '3Q 孵化所入門啟動包', sku: '3q-starter', price: 1280, qty: 1 }],
            sku: '3q-starter',
            lineUserId: ref,
            refCode: ref,
            clientBackUrl: window.location.origin + window.location.pathname + '?paid=1' + (ref ? '&ref=' + encodeURIComponent(ref) : '')
          });
        } catch (error) {
          button.disabled = false;
          button.textContent = '立即付款啟動';
          setStatus(error && error.message ? error.message : '付款頁建立失敗，請回 LINE 讓我們人工處理。', 'error');
        }
      });
    })();
  </script>
</body>
</html>
