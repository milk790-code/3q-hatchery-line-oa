name: Generate AI Photos

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'CF Workers AI model'
        required: false
        default: '@cf/stabilityai/stable-diffusion-xl-base-1.0'
        type: choice
        options:
          - '@cf/stabilityai/stable-diffusion-xl-base-1.0'
          - '@cf/bytedance/stable-diffusion-xl-lightning'
          - '@cf/black-forest-labs/flux-1-schnell'
  push:
    paths:
      - 'scripts/ai-prompts.json'
      - 'scripts/generate-ai-photos.mjs'
      - '.github/workflows/generate-ai-photos.yml'
    branches:
      - main

concurrency:
  group: ai-photos
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install sharp

      - name: Generate images
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_MODEL: ${{ inputs.model || '@cf/stabilityai/stable-diffusion-xl-base-1.0' }}
        run: node scripts/generate-ai-photos.mjs

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p assets/photography/ai
          git add assets/photography/ai/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ai-photos: regenerate from CF Workers AI (${{ inputs.model || 'sdxl-base' }})"
            git push
          fi
