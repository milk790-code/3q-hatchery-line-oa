name: Deploy 3Q LINE OA bot

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'workers/3q-line-oa/worker.js'
      - '.github/workflows/deploy-3q-line-oa.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_NAME: 3q-line-oa
      SESSION_KV_ID: 20a68b10afc84764ba770b64f0f33f30
      CRM_D1_ID: e54671b1-d15e-4552-babf-cef367267568
    steps:
      - uses: actions/checkout@v4
      - name: Set CF account ID
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV
      - name: Deploy (3-tier inherit-safe secrets)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          Q3_LINE_SECRET: ${{ secrets.Q3_LINE_SECRET }}
          Q3_LINE_TOKEN: ${{ secrets.Q3_LINE_TOKEN }}
          GO_FUNNEL_ADMIN_KEY: ${{ secrets.GO_FUNNEL_ADMIN_KEY }}
        run: |
          set -euo pipefail
          settings_json=$(curl -fsS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/settings")
          existing=$(printf '%s' "$settings_json" | jq -ce 'if .success == true and (.result | type == "object") and (.result.bindings | type == "array") then [.result.bindings[] | select(.type=="secret_text") | .name] else error("Worker settings lookup failed") end')
          secrets_json=$(jq -n --argjson existing "$existing" '
            def desired: [
              {name:"ANTHROPIC_API_KEY",val:(env.ANTHROPIC_API_KEY//"")},
              {name:"Q3_LINE_SECRET",val:(env.Q3_LINE_SECRET//"")},
              {name:"Q3_LINE_TOKEN",val:(env.Q3_LINE_TOKEN//"")},
              {name:"GO_FUNNEL_ADMIN_KEY",val:(env.GO_FUNNEL_ADMIN_KEY//"")}
            ];
            ($existing | map({name:., type:"inherit"})) as $inherited
            | (desired | map(select(.val != "") | {name:.name,type:"secret_text",text:.val})) as $provided
            | ($provided | map(.name)) as $provided_names
            | [$inherited[] | select(.name as $name | ($provided_names | index($name) | not))] + $provided')
          jq -n --argjson secrets "$secrets_json" --arg kv "$SESSION_KV_ID" --arg d1 "$CRM_D1_ID" '
            { main_module:"worker.js", compatibility_date:"2024-12-01",
              bindings: ([ {name:"SESSION",type:"kv_namespace",namespace_id:$kv},
              {name:"GENOME",type:"d1",id:"f0419cec-f26d-452b-b2a9-9fe3851a4174"},
                           {name:"CRM",type:"d1",id:$d1},
                           {name:"AI",type:"ai"},
                           {name:"DELAY_DO",type:"durable_object_namespace",class_name:"DelayReplyDO"},
                           {name:"QUIET_MODE",type:"plain_text",text:"off"} ] + $secrets) }' > /tmp/meta.json
          resp=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}?bindings_inherit=strict" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=@/tmp/meta.json;type=application/json" \
            -F "worker.js=@workers/3q-line-oa/worker.js;type=application/javascript+module")
          echo "$resp" | jq -e '.success==true' >/dev/null || { echo "$resp" | jq -c '.errors'; exit 1; }
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d '{"enabled":true}' | jq -e '.success==true' >/dev/null
          echo "::notice::3q-line-oa deployed"
