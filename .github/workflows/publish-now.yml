name: Publish Now (social-publisher)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '留空=全平台輪詢一次;或填 facebook / instagram / threads;填 backfill=回填已發貼文的引流連結'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish loop
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail
          if [ "${PLATFORM:-}" = "backfill" ]; then
            URL="https://3q-social-publisher.milk790.workers.dev/admin/backfill-links"
          else
            URL="https://3q-social-publisher.milk790.workers.dev/publish"
            if [ -n "${PLATFORM:-}" ]; then URL="${URL}?platform=${PLATFORM}"; fi
          fi
          resp=$(curl -sS -X POST "$URL" -H "Authorization: Bearer $TRIGGER_TOKEN")
          echo "$resp" | jq .
          echo "$resp" | jq -e '.ok == true' > /dev/null
          echo "::notice::publish loop done"
          echo "$resp" | jq -r '.results[]? | "::notice::\(.platform): \(if .published then "✅ 已發布 id=\(.id)" elif .skipped then "略過(\(.reason))" else "❌ \(.error // "失敗")" end)"'
