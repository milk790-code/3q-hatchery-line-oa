name: 🚀 Deploy ALL microsites (orchestrator)

# 一鍵全微站部署 dispatcher。
# matrix fan-out 觸發 9 支既有 deploy-* workflow，不複製任何部署邏輯（零 drift）。
# 單支失敗不拖累其他（fail-fast:false + continue-on-error）。
#
# ⚠️ 前置（一次性）：GitHub 的 GITHUB_TOKEN 無法觸發其他 workflow 的 workflow_dispatch
#   （防遞迴硬限制），故需一個 PAT。沒設 PAT 時本檔不會紅燈，會自動降級為「手動連結模式」。
#   設定路徑：Settings → Secrets and variables → Actions → New repository secret
#            Name = ORCHESTRATOR_PAT
#            Value = 一個 fine-grained PAT，對本 repo 給 "Actions: Read and write" + "Contents: Read"

on:
  workflow_dispatch:
    inputs:
      targets:
        description: '要推的微站（逗號分隔檔名去 .yml，或 all）'
        required: false
        default: 'all'
        type: string

permissions:
  actions: write
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_pat: ${{ steps.pat.outputs.has_pat }}
    steps:
      - name: Detect PAT
        id: pat
        env:
          ORCH_PAT: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          set -euo pipefail
          if [ -n "${ORCH_PAT:-}" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ORCHESTRATOR_PAT 已設 → 全自動 fan-out 模式"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ORCHESTRATOR_PAT 未設 → 降級為手動連結模式（不報錯）"
          fi

      - name: Build target matrix
        id: build
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          all='["deploy-ai-subsidy","deploy-art-portfolio","deploy-fukubukuro","deploy-tudigong","deploy-sales-ai","deploy-pop-line-oa","deploy-outreach","deploy-sanzhi-pages","renovation-deploy"]'
          if [ -z "${TARGETS:-}" ] || [ "$TARGETS" = "all" ]; then
            echo "matrix=$all" >> "$GITHUB_OUTPUT"
          else
            sel=$(printf '%s' "$TARGETS" | tr ',' '\n' | tr -d '[:space:]' | grep -v '^$' | jq -R . | jq -cs .)
            echo "matrix=$sel" >> "$GITHUB_OUTPUT"
          fi

  dispatch:
    needs: preflight
    if: needs.preflight.outputs.has_pat == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wf: ${{ fromJson(needs.preflight.outputs.matrix) }}
    steps:
      - name: Dispatch ${{ matrix.wf }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
          REPO: ${{ github.repository }}
          WF: ${{ matrix.wf }}
        run: |
          set -euo pipefail
          echo "::notice::dispatching ${WF}.yml @ main"
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WF}.yml/dispatches" \
            -d '{"ref":"main"}')
          if [ "$code" = "204" ]; then
            echo "✅ ${WF} dispatched (HTTP 204)"
          else
            echo "::error::${WF} dispatch failed (HTTP ${code})"
            cat /tmp/resp.txt || true
            exit 1
          fi

  summary:
    needs: [preflight, dispatch]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        env:
          REPO: ${{ github.repository }}
          HAS_PAT: ${{ needs.preflight.outputs.has_pat }}
        run: |
          set -euo pipefail
          ALL="deploy-ai-subsidy deploy-art-portfolio deploy-fukubukuro deploy-tudigong deploy-sales-ai deploy-pop-line-oa deploy-outreach deploy-sanzhi-pages renovation-deploy"
          {
            echo "## 🚀 全微站部署 orchestrator"
            if [ "${HAS_PAT}" = "true" ]; then
              echo "已對選定微站送出 \`workflow_dispatch\`。各自綠/紅燈見下方各連結："
              echo ""
              for w in $ALL; do
                echo "- [$w](https://github.com/${REPO}/actions/workflows/$w.yml)"
              done
              echo ""
              echo "👉 [一次看全部 dispatch 結果](https://github.com/${REPO}/actions?query=event%3Aworkflow_dispatch)"
            else
              echo "### ⚠️ 未設 \`ORCHESTRATOR_PAT\` — 已降級為手動連結模式（本檔未失敗）"
              echo ""
              echo "GitHub 的 \`GITHUB_TOKEN\` 無法 fan-out 觸發其他 workflow（防遞迴硬限制）。"
              echo "設一次 PAT 即可全自動。路徑：**Settings → Secrets and variables → Actions → New repository secret**，Name = \`ORCHESTRATOR_PAT\`。"
              echo ""
              echo "在設好之前，逐支手動連結（點進去按 Run workflow）："
              echo ""
              for w in $ALL; do
                echo "- [$w](https://github.com/${REPO}/actions/workflows/$w.yml)"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
