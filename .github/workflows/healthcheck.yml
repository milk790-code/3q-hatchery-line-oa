name: Daily healthcheck

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC daily (= 08:00 Taiwan)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Worker GET endpoint
        run: |
          set -euo pipefail
          URL="https://3q-hatchery-webhook.milk790.workers.dev"
          echo "Probing: $URL"
          resp=$(curl -fsS --max-time 15 "$URL")
          echo "$resp" | jq .
          # Worker must respond with ok=true and all 3 env vars configured
          echo "$resp" | jq -e '.ok == true' > /dev/null
          echo "$resp" | jq -e '.configured.token == true' > /dev/null
          echo "$resp" | jq -e '.configured.secret == true' > /dev/null
          echo "$resp" | jq -e '.configured.png_base != null' > /dev/null
          echo "::notice::Worker healthy"

      - name: Probe one Pages PNG (welcome card)
        run: |
          set -euo pipefail
          URL="https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports/3q-welcome-card-1040.png"
          echo "Probing: $URL"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
          if [ "$code" != "200" ]; then
            echo "::error::Pages PNG returned HTTP $code"
            exit 1
          fi
          echo "::notice::Pages serving PNG (HTTP 200)"

      - name: Daily summary
        if: always()
        run: |
          echo "## Healthcheck $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pages PNG: see above" >> $GITHUB_STEP_SUMMARY
