name: Setup Facebook Page Token

on:
  workflow_dispatch:
    inputs:
      fb_short_token:
        description: '⚠ 建議留空！請改用 repo secret FB_SHORT_TOKEN（Settings → Secrets → Actions）。此輸入框僅為備用：dispatch inputs 非加密、可能留在執行紀錄中。Token 需求權限：pages_show_list / pages_manage_posts / pages_read_engagement / instagram_basic / instagram_content_publish'
        required: false
        type: string

jobs:
  setup:
    name: Extend Token → Get Page Token → Deploy Worker
    runs-on: ubuntu-latest
    env:
      SOCIAL_WORKER_NAME: 3q-social-publisher
      SESSION_KV_ID: 20a68b10afc84764ba770b64f0f33f30
      CRM_D1_ID: e54671b1-d15e-4552-babf-cef367267568
      PNG_BASE_URL: https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports
      FB_APP_ID: '956987317313843'
      FB_PAGE_ID: '61587003785491'
      THREADS_APP_ID: '956987317313843'

    steps:
      - uses: actions/checkout@v4

      - name: Set CF account ID
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV

      - name: Extend to 60-day long-lived User Token
        env:
          FB_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          # Repo secret first (encrypted + log-masked); dispatch input only as fallback.
          SHORT_TOKEN: ${{ secrets.FB_SHORT_TOKEN || inputs.fb_short_token }}
        run: |
          set -euo pipefail
          if [ -z "${SHORT_TOKEN:-}" ]; then
            echo "::error::No token provided. Add repo secret FB_SHORT_TOKEN (Settings → Secrets and variables → Actions) and re-run."
            exit 1
          fi
          resp=$(curl -sS \
            "https://graph.facebook.com/v21.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${FB_APP_ID}&client_secret=${FB_APP_SECRET}&fb_exchange_token=${SHORT_TOKEN}")
          LONG=$(echo "$resp" | jq -r '.access_token // empty')
          if [ -z "$LONG" ]; then
            echo "::error::Token extension failed: $(echo $resp | jq -c .)"
            exit 1
          fi
          echo "FB_USER_TOKEN=$LONG" >> $GITHUB_ENV
          echo "::notice::Long-lived user token obtained"

      - name: Get Page Access Token (never expires)
        run: |
          set -euo pipefail
          resp=$(curl -sS \
            "https://graph.facebook.com/v21.0/me/accounts?access_token=${FB_USER_TOKEN}")
          echo "Pages available:"
          echo "$resp" | jq -r '.data[]? | "\(.id)  \(.name)"' || true

          PAGE_TOKEN=$(echo "$resp" | jq -r \
            --arg pid "$FB_PAGE_ID" \
            '.data[]? | select(.id == $pid) | .access_token // empty')

          if [ -z "$PAGE_TOKEN" ]; then
            echo "::error::Page $FB_PAGE_ID not found in /me/accounts. Make sure pages_manage_posts is granted."
            echo "Response: $(echo $resp | jq -c .)"
            exit 1
          fi
          echo "FB_PAGE_ACCESS_TOKEN=$PAGE_TOKEN" >> $GITHUB_ENV
          echo "::notice::Page Access Token obtained for page $FB_PAGE_ID"

      - name: Get Instagram Business Account ID
        run: |
          set -euo pipefail
          resp=$(curl -sS \
            "https://graph.facebook.com/v21.0/${FB_PAGE_ID}?fields=instagram_business_account&access_token=${FB_PAGE_ACCESS_TOKEN}")
          IG_USER_ID=$(echo "$resp" | jq -r '.instagram_business_account.id // empty')
          if [ -z "$IG_USER_ID" ]; then
            echo "::warning::No Instagram Business Account linked to page $FB_PAGE_ID — IG publishing disabled"
          else
            echo "::notice::Instagram Business Account ID: $IG_USER_ID"
          fi
          echo "IG_USER_ID=${IG_USER_ID:-}" >> $GITHUB_ENV

      - name: Store FB + IG Tokens in Cloudflare KV
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          declare -a PAIRS=(
            "token:fb:page_token=${FB_PAGE_ACCESS_TOKEN}"
            "token:fb:page_id=${FB_PAGE_ID}"
          )
          if [ -n "${IG_USER_ID:-}" ]; then
            PAIRS+=("token:ig:access=${FB_PAGE_ACCESS_TOKEN}")
            PAIRS+=("token:ig:user_id=${IG_USER_ID}")
          fi
          for KEY_VAL in "${PAIRS[@]}"; do
            KEY="${KEY_VAL%%=*}"
            VAL="${KEY_VAL#*=}"
            curl -sS -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${SESSION_KV_ID}/values/${KEY}" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: text/plain" \
              --data "$VAL" | jq -r '"KV " + (if .success then "✓" else "✗" end) + " " + $key' \
              --arg key "$KEY" || true
          done
          echo "::notice::FB + IG Tokens stored in KV (permanent)"

      - name: Bind FB + IG secrets on worker (surgical — touches nothing else)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          # Per-secret PUT via the Workers secrets API: updates ONE secret each call,
          # never rewrites the script or other bindings. This replaces the old
          # full-metadata redeploy that hardcoded "" for TIKTOK/GOOGLE secrets and
          # re-washed anything not passed in (same disease as the 2026-06-06 incident).
          put_secret() {
            curl -sS -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${SOCIAL_WORKER_NAME}/secrets" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg n "$1" --arg t "$2" '{name: $n, text: $t, type: "secret_text"}')" \
              | jq -r --arg n "$1" '"secret " + $n + ": " + (.success | tostring)'
          }
          put_secret FB_PAGE_ACCESS_TOKEN "$FB_PAGE_ACCESS_TOKEN"
          put_secret IG_ACCESS_TOKEN     "$FB_PAGE_ACCESS_TOKEN"
          if [ -n "${IG_USER_ID:-}" ]; then
            put_secret IG_USER_ID "$IG_USER_ID"
          fi
          echo "::notice::FB/IG secrets bound — script and other bindings untouched"

      - name: Verify /health endpoint
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          SUB=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            | jq -r '.result.subdomain // empty')
          SOCIAL_URL="https://${SOCIAL_WORKER_NAME}.${SUB}.workers.dev"
          echo "SOCIAL_URL=$SOCIAL_URL" >> $GITHUB_ENV
          sleep 5
          resp=$(curl -sS "${SOCIAL_URL}/health" || echo '{}')
          echo "$resp" | jq . || true
          echo "$resp" | jq -e '.configured.facebook == true' > /dev/null \
            && echo "::notice::Facebook OK" \
            || echo "::warning::Facebook not yet reflected in /health (token is stored, publish will work)"

      - name: Summary
        run: |
          echo "## Facebook + Instagram 永久授權完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | \`$SOCIAL_URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| FB Page ID | \`$FB_PAGE_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IG User ID | \`${IG_USER_ID:-（無連結的 IG 帳號）}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| FB Token 類型 | Page Access Token（永不過期）|" >> $GITHUB_STEP_SUMMARY
          echo "| IG Token | 同 FB Page Token（IG Business 帳號需連結到同一粉專）|" >> $GITHUB_STEP_SUMMARY
          echo "| Token 存儲 | Cloudflare Worker s