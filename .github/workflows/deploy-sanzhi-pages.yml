name: Deploy sanzhi portal (Cloudflare Pages)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'sanzhi/**'

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy sanzhi/ to Cloudflare Pages project sanzhi-3q
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy sanzhi --project-name=sanzhi-3q --branch=main --commit-dirty=true

      - name: Smoke test (informational)
        run: |
          sleep 12
          for f in index.html agreement.pdf report.pdf tags.pdf algo.pdf growth.pdf; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://sanzhi-3q.pages.dev/$f")
            size=$(curl -s -o /dev/null -w '%{size_download}' "https://sanzhi-3q.pages.dev/$f")
            echo "$f -> HTTP $code, $size bytes"
          done
          echo "agreement.pdf should be ~281286 bytes (was 626 = broken placeholder)"
