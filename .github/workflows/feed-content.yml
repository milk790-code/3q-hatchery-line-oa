name: Feed content queue

# content/feed/*.json -> 3q-social-publisher /queue/add.
# Push mode feeds only files changed in that push.
# Manual dispatch can safely compensate overdue campaigns before feeding.
on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Filename under content/feed/, for example 3q-gov-subsidy-30day.json'
        required: true
        type: string
      overdue_policy:
        description: 'Manual dispatch only: preserve original dates, skip past rows, or spread past rows to free future 08:00 TW slots'
        required: true
        default: preserve
        type: choice
        options:
          - preserve
          - skip_past
          - spread_overdue
      start_date:
        description: 'Optional YYYY-MM-DD for spread_overdue first candidate date in Asia/Taipei'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'content/feed/*.json'

permissions:
  contents: read

jobs:
  feed:
    runs-on: ubuntu-latest
    env:
      SOCIAL_URL: https://3q-social-publisher.milk790.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Pick feed files
        id: pick
        env:
          INPUT_FILE: ${{ inputs.file }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_FILE:-}" ]; then
            files="content/feed/${INPUT_FILE}"
            [ -f "$files" ] || { echo "::error::$files does not exist"; exit 1; }
          else
            files=$(git diff --name-only HEAD^ HEAD -- 'content/feed/*.json' || true)
          fi
          if [ -z "$files" ]; then echo "::notice::No changed feed files"; fi
          { echo "files<<EOF"; echo "$files"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Validate feed files
        if: steps.pick.outputs.files != ''
        run: |
          set -euo pipefail
          node scripts/validate-feed.mjs --self-test
          node scripts/prepare-feed-dispatch.mjs --self-test
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            node scripts/validate-feed.mjs "$f"
          done <<< "${{ steps.pick.outputs.files }}"

      - name: Wait for worker >= 2.6
        if: steps.pick.outputs.files != ''
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            ver=$(curl -sm10 "$SOCIAL_URL/health" | jq -r '.version // empty' || true)
            echo "try$i version=$ver"
            if [ -n "$ver" ] && [ "$(printf '%s\n2.6\n' "$ver" | sort -V | head -1)" = "2.6" ]; then exit 0; fi
            sleep 5
          done
          echo '::error::worker version <2.6; queue dashboard + campaign-safe dedup are not live'
          exit 1

      - name: Feed to /queue/add
        if: steps.pick.outputs.files != ''
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
          OVERDUE_POLICY: ${{ inputs.overdue_policy || 'preserve' }}
          START_DATE: ${{ inputs.start_date }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/feed-payloads
          {
            echo "## Feed result $(date -u +'%F %T UTC')"
            echo ""
            echo "| file | policy | added | skipped | errors | new ids |"
            echo "|---|---|---:|---:|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r f; do
            [ -n "$f" ] || continue
            payload="$f"
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              payload="/tmp/feed-payloads/$(basename "$f")"
              prepare_args=(scripts/prepare-feed-dispatch.mjs "$f" "$payload" --overdue-policy "$OVERDUE_POLICY")
              if [ -n "${START_DATE:-}" ]; then
                prepare_args+=(--start-date "$START_DATE")
              fi
              node "${prepare_args[@]}" >> "$GITHUB_STEP_SUMMARY"
              node scripts/validate-feed.mjs "$payload"
            fi

            resp=$(curl -fsS -X POST "$SOCIAL_URL/queue/add" \
              -H "Authorization: Bearer $TRIGGER_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary @"$payload")
            echo "$resp" | jq .
            echo "$resp" | jq -e '.errors | length == 0' > /dev/null \
              || { echo "::error::$f rejected by worker: $(echo "$resp" | jq -c '.errors')"; exit 1; }
            echo "| \`$f\` | \`${OVERDUE_POLICY}\` | $(echo "$resp" | jq '.added') | $(echo "$resp" | jq '.skipped | length') | $(echo "$resp" | jq '.errors | length') | \`$(echo "$resp" | jq -c '.ids')\` |" >> "$GITHUB_STEP_SUMMARY"
            skipped=$(echo "$resp" | jq -c '.skipped')
            if [ "$skipped" != "[]" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "<details><summary>Skipped rows for $f</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              echo "$skipped" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            fi
          done <<< "${{ steps.pick.outputs.files }}"
          echo "::notice::Feed complete; see run summary"

      - name: Queue summary
        if: steps.pick.outputs.files != ''
        env:
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          summary=$(curl -fsS "$SOCIAL_URL/queue/list?limit=20&source_oa=3q-hatchery" \
            -H "Authorization: Bearer $TRIGGER_TOKEN")
          {
            echo ""
            echo "## Queue summary"
            echo ""
            echo "Generated: $(echo "$summary" | jq -r '.generated_at')"
            echo ""
            echo "### Counts"
            echo ""
            echo "| platform | status | count |"
            echo "|---|---|---:|"
            echo "$summary" | jq -r '.counts[] | "| \(.platform) | \(.status) | \(.n) |"'
            echo ""
            echo "### Overdue pending"
            echo ""
            if [ "$(echo "$summary" | jq '.overdue | length')" = "0" ]; then
              echo "None"
            else
              echo "| platform | count |"
              echo "|---|---:|"
              echo "$summary" | jq -r '.overdue[] | "| \(.platform) | \(.n) |"'
            fi
            echo ""
            echo "### Latest rows"
            echo ""
            echo "| id | platform | status | scheduled_at | preview |"
            echo "|---:|---|---|---|---|"
            echo "$summary" | jq -r '.rows[] | "| \(.id) | \(.platform) | \(.status) | \(.scheduled_at // "") | \((.preview // "") | gsub("\\n"; " ") | gsub("\\|"; "\\\\|")) |"'
          } >> "$GITHUB_STEP_SUMMARY"
