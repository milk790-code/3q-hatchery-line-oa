name: Deploy 3Q Hatchery LINE OA

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'webhook/worker.js'
      - 'assets/exports/3q-richmenu-2500x1686.jpg'
      - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ['Render PNG assets']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
    env:
      PNG_BASE_URL: https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports
      WORKER_NAME: 3q-hatchery-webhook
      SESSION_KV_ID: 20a68b10afc84764ba770b64f0f33f30
      CRM_D1_ID: e54671b1-d15e-4552-babf-cef367267568
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          echo "$resp" | jq -e '.success == true' > /dev/null
          echo "::notice::CF token OK ($(echo "$resp" | jq -r '.result.status'))"

      - name: Verify LINE token
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/info)
          name=$(echo "$resp" | jq -r '.displayName // empty')
          if [ -z "$name" ]; then
            echo "::error::LINE token bad: $resp"
            exit 1
          fi
          echo "::notice::LINE bot: $name ($(echo "$resp" | jq -r '.basicId'))"

      - name: Set Cloudflare account ID
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::CF_ACCOUNT_ID secret is empty"
            exit 1
          fi
          echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV
          echo "::notice::Using CF account ID (hidden)"

      - name: Deploy Worker
        env:
          CF_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          LINE_TOKEN:    ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_SECRET:   ${{ secrets.LINE_CHANNEL_SECRET }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
        run: |
          set -uo pipefail
          mkdir -p _debug

          # Probe D1 binding — if it doesn't exist, skip it (CRM features become no-op)
          d1_check=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CRM_D1_ID}" \
            | jq -r '.success // false')
          if [ "$d1_check" = "true" ]; then
            CRM_BINDING=',{"name": "CRM", "type": "d1", "id": "'$CRM_D1_ID'"}'
            echo "::notice::D1 binding OK"
          else
            CRM_BINDING=""
            echo "::warning::D1 database not accessible — deploying without CRM binding"
          fi

          cat > /tmp/metadata.json <<JSON
          {
            "main_module": "worker.js",
            "compatibility_date": "2024-12-01",
            "bindings": [
              {"name": "LINE_CHANNEL_ACCESS_TOKEN", "type": "secret_text", "text": $(jq -Rn --arg t "$LINE_TOKEN" '$t')},
              {"name": "LINE_CHANNEL_SECRET",       "type": "secret_text", "text": $(jq -Rn --arg t "$LINE_SECRET" '$t')},
              {"name": "OWNER_USER_ID",             "type": "secret_text", "text": $(jq -Rn --arg t "$OWNER_USER_ID" '$t')},
              {"name": "PNG_BASE_URL",              "type": "plain_text",  "text": $(jq -Rn --arg t "$PNG_BASE_URL" '$t')},
              {"name": "SESSION",                   "type": "kv_namespace", "namespace_id": "$SESSION_KV_ID"},
              {"name": "AI",                        "type": "ai"}
              $CRM_BINDING
            ]
          }
          JSON

          jq '(.bindings[] | select(.type=="secret_text") | .text) = "***MASKED***"' /tmp/metadata.json > _debug/metadata-sanitized.json

          set +e
          http_code=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "worker.js=@webhook/worker.js;type=application/javascript+module" \
            -o _debug/cf-deploy-response.json -w "%{http_code}")
          curl_exit=$?
          set -e

          echo "$http_code" > _debug/cf-deploy-http-code.txt
          echo "$curl_exit" > _debug/cf-deploy-curl-exit.txt

          ok=$(jq -r '.success // false' _debug/cf-deploy-response.json 2>/dev/null || echo "parse-error")
          if [ "$ok" != "true" ]; then
            echo "DEPLOY FAILED — http=$http_code curl_exit=$curl_exit ok=$ok"
            cat _debug/cf-deploy-response.json
            exit 1
          fi
          echo "Worker uploaded (etag=$(jq -r '.result.etag' _debug/cf-deploy-response.json))"

      - name: CF deploy diagnostics (summary + commit on failure)
        if: always()
        run: |
          echo "## CF Deploy Diagnostics" >> $GITHUB_STEP_SUMMARY
          if [ -d _debug ]; then
            for f in _debug/*; do [ -f "$f" ] || continue;
              echo "### \`$f\`" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              head -c 3000 "$f" >> $GITHUB_STEP_SUMMARY
              echo >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Commit deploy debug files (on failure only)
        if: failure()
        run: |
          if [ -d _debug ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p _debug/deploy
            mv _debug/* _debug/deploy/ 2>/dev/null || true
            git add _debug/deploy/
            git diff --cached --quiet || git commit -m "deploy: debug artifacts from failed run"
            git push || true
          fi

      - name: Enable workers.dev subdomain
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}' \
            | jq -e '.success == true' > /dev/null

          SUB=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            | jq -r '.result.subdomain')
          WORKER_URL="https://${WORKER_NAME}.${SUB}.workers.dev"
          echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV
          echo "::notice::Worker URL: $WORKER_URL"

      - name: Smoke-test Worker URL
        run: |
          set -euo pipefail
          sleep 5
          resp=$(curl -sS "$WORKER_URL")
          echo "$resp" | jq .
          echo "$resp" | jq -e '.ok == true and .configured.token == true and .configured.secret == true and .configured.session_kv == true' > /dev/null
          echo "::notice::Worker alive — token, secret, KV configured"

      - name: Ensure LINE Rich Menu (reuse by name, else create)
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          RM_NAME: '3Q Hatchery · MENU (postback v3)'
        run: |
          set -euo pipefail
          existing=$(curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/richmenu/list \
            | jq -r --arg n "$RM_NAME" '.richmenus[] | select(.name == $n) | .richMenuId' \
            | head -1)
          if [ -n "$existing" ]; then
            echo "RICH_MENU_ID=$existing" >> $GITHUB_ENV
            echo "::notice::Reusing existing Rich Menu: $existing"
            exit 0
          fi
          cat > /tmp/richmenu.json <<'JSON'
          {
            "size": {"width": 2500, "height": 1686},
            "selected": false,
            "name": "3Q Hatchery · MENU (postback v3)",
            "chatBarText": "MENU",
            "areas": [
              {"bounds": {"x":    0, "y":   0, "width": 2500, "height": 800}, "action": {"type": "uri",      "uri":  "https://3q-hatchery.tw"}},
              {"bounds": {"x":    0, "y": 800, "width":  625, "height": 886}, "action": {"type": "postback", "data": "menu:my-store"}},
              {"bounds": {"x":  625, "y": 800, "width":  625, "height": 886}, "action": {"type": "postback", "data": "menu:imagery"}},
              {"bounds": {"x": 1250, "y": 800, "width":  625, "height": 886}, "action": {"type": "postback", "data": "menu:marketing"}},
              {"bounds": {"x": 1875, "y": 800, "width":  625, "height": 886}, "action": {"type": "postback", "data": "menu:progress"}}
            ]
          }
          JSON
          resp=$(curl -sS -X POST https://api.line.me/v2/bot/richmenu \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/richmenu.json)
          RM_ID=$(echo "$resp" | jq -r '.richMenuId // empty')
          if [ -z "$RM_ID" ]; then echo "::error::Rich Menu create failed: $resp"; exit 1; fi
          echo "RICH_MENU_ID=$RM_ID" >> $GITHUB_ENV
          echo "::notice::Created new Rich Menu: $RM_ID"

      - name: Upload Rich Menu binary (skip if already uploaded)
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          set +e
          probe_http=$(curl -sS -o /tmp/probe -w "%{http_code}" \
            "https://api-data.line.me/v2/bot/richmenu/${RICH_MENU_ID}/content" \
            -H "Authorization: Bearer $LINE_TOKEN")
          set -e
          probe_size=$(wc -c < /tmp/probe 2>/dev/null || echo 0)
          if [ "$probe_http" = "200" ] && [ "$probe_size" -gt 1000 ]; then
            echo "::notice::Binary already uploaded ($probe_size bytes), skipping"
            exit 0
          fi
          curl -sS -f -X POST \
            "https://api-data.line.me/v2/bot/richmenu/${RICH_MENU_ID}/content" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: image/jpeg" \
            --data-binary @assets/exports/3q-richmenu-2500x1686.jpg
          echo "::notice::Rich Menu binary uploaded"

      - name: Set Rich Menu as default (via Python requests — defeats Akamai 411)
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          pip install --quiet requests
          python3 - <<'PY'
          import os, sys, requests
          rm_id = os.environ['RICH_MENU_ID']
          token = os.environ['LINE_TOKEN']
          r = requests.post(
              f'https://api.line.me/v2/bot/user/all/richmenu/{rm_id}',
              headers={'Authorization': f'Bearer {token}'},
              timeout=15,
          )
          print(f'HTTP {r.status_code}: {r.text}')
          if r.status_code != 200:
              sys.exit(f'set-default failed: {r.status_code} {r.text}')
          PY
          echo "::notice::Default rich menu set"

      - name: Set LINE webhook URL
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -f -X PUT \
            https://api.line.me/v2/bot/channel/webhook/endpoint \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$WORKER_URL\"}"
          echo "::notice::Webhook URL set to $WORKER_URL"

      - name: Test webhook from LINE side
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -X POST \
            https://api.line.me/v2/bot/channel/webhook/test \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$WORKER_URL\"}")
          echo "$resp" | jq .
          if echo "$resp" | jq -e '.success == true' > /dev/null; then
            echo "::notice::Webhook verification: SUCCESS"
          else
            echo "::warning::Webhook test returned non-success — may still work for real events. $resp"
          fi

      - name: Deploy summary
        run: |
          echo "## Deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker URL | \`$WORKER_URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rich Menu ID | \`$RICH_MENU_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| KV namespace (SESSION) | \`$SESSION_KV_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| D1 database (CRM) | \`$CRM_D1_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook | configured |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Manual steps remaining" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Optional: set OWNER_USER_ID secret for inquiry push alerts" >> $GITHUB_STEP_SUMMARY
          echo "2. Query D1: \`wrangler d1 execute 3q-hatchery-crm --command 'SELECT * FROM inquiries ORDER BY id DESC LIMIT 10'\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Self-test: add bot → tap menu → step through flow → confirm → check D1 row" >> $GITHUB_STEP_SUMMARY
