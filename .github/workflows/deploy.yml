name: Deploy 3Q Hatchery LINE OA

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'webhook/worker.js'
      - 'assets/exports/3q-richmenu-2500x1686.jpg'
      - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ['Render PNG assets']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
    env:
      PNG_BASE_URL: https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports
      WORKER_NAME: 3q-hatchery-webhook
      SESSION_KV_ID: 20a68b10afc84764ba770b64f0f33f30
      CRM_D1_ID: e54671b1-d15e-4552-babf-cef367267568
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          echo "$resp" | jq -e '.success == true' > /dev/null
          echo "::notice::CF token OK ($(echo "$resp" | jq -r '.result.status'))"

      - name: Verify LINE token
        continue-on-error: true
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          resp=$(curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/info)
          name=$(echo "$resp" | jq -r '.displayName // empty')
          if [ -z "$name" ]; then
            echo "::warning::LINE token check failed: $resp"
            echo "::warning::Worker will still deploy. Refresh LINE_CHANNEL_ACCESS_TOKEN if webhook stops responding."
          else
            echo "::notice::LINE bot: $name ($(echo "$resp" | jq -r '.basicId'))"
          fi
      - name: Set Cloudflare account ID
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::CF_ACCOUNT_ID secret is empty"
            exit 1
          fi
          echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV
          echo "::notice::Using CF account ID (hidden)"

      - name: Run D1 migrations (idempotent)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          # Create campaigns table
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CRM_D1_ID}/query" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"sql":"CREATE TABLE IF NOT EXISTS campaigns (id INTEGER PRIMARY KEY AUTOINCREMENT, user_id TEXT NOT NULL, tier TEXT NOT NULL, price INTEGER NOT NULL, sample_pick TEXT, created_at DATETIME DEFAULT CURRENT_TIMESTAMP)"}' \
            | jq -r '"campaigns table: " + (.success | tostring)'

          # Add follow-up columns to inquiries (ignore duplicate column errors)
          for col in followed_up_24h followed_up_72h followed_up_168h; do
            result=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CRM_D1_ID}/query" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"sql\":\"ALTER TABLE inquiries ADD COLUMN ${col} INTEGER DEFAULT 0\"}")
            echo "$result" | jq -r '"inquiries.'"$col"': " + (.success | tostring) + " " + (.errors[0].message // "")'
          done

          # v3.5: Add lead scoring, status tracking, booking columns (ignore if already exist)
          for col_def in \
            "lead_score TEXT DEFAULT 'cold'" \
            "status TEXT DEFAULT 'new'" \
            "booking_requested INTEGER DEFAULT 0" \
            "booking_note TEXT"; do
            col_name=$(echo "$col_def" | awk '{print $1}')
            result=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CRM_D1_ID}/query" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"sql\":\"ALTER TABLE inquiries ADD COLUMN ${col_def}\"}")
            echo "$result" | jq -r '"inquiries.'"$col_name"': " + (.success | tostring) + " " + (.errors[0].message // "")'
          done

          echo "::notice::D1 migrations complete"

      - name: Build & upload 3 Rich Menus (A/B/C)
        continue-on-error: true
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${LINE_TOKEN:-}" ]; then
            echo "::warning::LINE_CHANNEL_ACCESS_TOKEN not set — skipping Rich Menu upload"
            exit 0
          fi
          cd assets/exports
          CHANNEL_TOKEN="$LINE_TOKEN" bash "$GITHUB_WORKSPACE/scripts/upload-richmenu.sh" --prune \
            2>&1 | tee /tmp/rm-ids.txt || true
          RM_A=$(grep "RICHMENU_NEW"       /tmp/rm-ids.txt | grep -oE "richmenu-[a-z0-9]+" | head -1)
          RM_B=$(grep "RICHMENU_INQUIRED"  /tmp/rm-ids.txt | grep -oE "richmenu-[a-z0-9]+" | head -1)
          RM_C=$(grep "RICHMENU_CONVERTED" /tmp/rm-ids.txt | grep -oE "richmenu-[a-z0-9]+" | head -1)
          echo "RICHMENU_A=${RM_A:-}" >> $GITHUB_ENV
          echo "RICHMENU_B=${RM_B:-}" >> $GITHUB_ENV
          echo "RICHMENU_C=${RM_C:-}" >> $GITHUB_ENV
          if [ -n "$RM_A" ] && [ -n "$RM_B" ] && [ -n "$RM_C" ]; then
            echo "::notice::Rich Menus A=$RM_A B=$RM_B C=$RM_C"
          else
            echo "::warning::One or more Rich Menu IDs not captured — menu switching may be inactive"
          fi

      - name: Deploy Worker
        env:
          CF_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          LINE_TOKEN:    ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_SECRET:   ${{ secrets.LINE_CHANNEL_SECRET }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p _debug

          # Probe D1 binding — if not accessible, deploy without CRM (becomes no-op)
          d1_check=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CRM_D1_ID}" \
            | jq -r '.success // false')
          if [ "$d1_check" = "true" ]; then
            CRM_BINDING=",{\"name\": \"CRM\", \"type\": \"d1\", \"id\": \"$CRM_D1_ID\"}"
            echo "::notice::D1 binding OK"
          else
            CRM_BINDING=""
            echo "::warning::D1 database not accessible — deploying without CRM binding"
          fi

          cat > /tmp/metadata.json <<JSON
          {
            "main_module": "worker.js",
            "compatibility_date": "2024-12-01",
            "bindings": [
              {"name": "LINE_CHANNEL_ACCESS_TOKEN", "type": "secret_text", "text": $(jq -Rn --arg t "$LINE_TOKEN" '$t')},
              {"name": "LINE_CHANNEL_SECRET",       "type": "secret_text", "text": $(jq -Rn --arg t "$LINE_SECRET" '$t')},
              {"name": "OWNER_USER_ID",             "type": "secret_text", "text": $(jq -Rn --arg t "${OWNER_USER_ID:-}" '$t')},
              {"name": "PNG_BASE_URL",              "type": "plain_text",  "text": $(jq -Rn --arg t "$PNG_BASE_URL" '$t')},
              {"name": "TRIGGER_TOKEN",             "type": "secret_text", "text": $(jq -Rn --arg t "${TRIGGER_TOKEN:-}" '$t')},
              {"name": "SESSION",                   "type": "kv_namespace", "namespace_id": "$SESSION_KV_ID"},
              {"name": "AI",                        "type": "ai"},
              {"name": "RICHMENU_NEW",       "type": "plain_text", "text": $(jq -Rn --arg t "${RICHMENU_A:-}" '$t')},
              {"name": "RICHMENU_INQUIRED",  "type": "plain_text", "text": $(jq -Rn --arg t "${RICHMENU_B:-}" '$t')},
              {"name": "RICHMENU_CONVERTED", "type": "plain_text", "text": $(jq -Rn --arg t "${RICHMENU_C:-}" '$t')}
              $CRM_BINDING
            ]
          }
          JSON

          jq '(.bindings[] | select(.type=="secret_text") | .text) = "***MASKED***"' /tmp/metadata.json > _debug/metadata-sanitized.json

          set +e
          http_code=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "worker.js=@webhook/worker.js;type=application/javascript+module" \
            -o _debug/cf-deploy-response.json -w "%{http_code}")
          curl_exit=$?
          set -e

          echo "$http_code" > _debug/cf-deploy-http-code.txt
          echo "$curl_exit" > _debug/cf-deploy-curl-exit.txt

          ok=$(jq -r '.success // false' _debug/cf-deploy-response.json 2>/dev/null || echo "parse-error")
          if [ "$ok" != "true" ]; then
            echo "DEPLOY FAILED — http=$http_code curl_exit=$curl_exit ok=$ok"
            cat _debug/cf-deploy-response.json
            exit 1
          fi
          echo "Worker uploaded (etag=$(jq -r '.result.etag' _debug/cf-deploy-response.json))"

      - name: Set cron triggers
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/schedules" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[{"cron": "5 * * * *"}, {"cron": "0 13 * * 1"}, {"cron": "0 1 1 3,6,9,12 *"}]' \
            | jq -e '.success == true' > /dev/null
          echo "::notice::Cron set: follow-ups (hourly :05) + weekly digest (Mon 21:00 TW) + seasonal push (Mar/Jun/Sep/Dec 1st 09:00 TW)"

      - name: CF deploy diagnostics (summary + commit on failure)
        if: always()
        run: |
          echo "## CF Deploy Diagnostics" >> $GITHUB_STEP_SUMMARY
          if [ -d _debug ]; then
            for f in _debug/*; do [ -f "$f" ] || continue;
              echo "### \`$f\`" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              head -c 3000 "$f" >> $GITHUB_STEP_SUMMARY
              echo >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Commit deploy debug files (on failure only)
        if: failure()
        run: |
          if [ -d _debug ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p _debug/deploy
            mv _debug/* _debug/deploy/ 2>/dev/null || true
            git add _debug/deploy/
            git diff --cached --quiet || git commit -m "deploy: debug artifacts from failed run"
            git push || true
          fi

      - name: Enable workers.dev subdomain
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}' \
            | jq -e '.success == true' > /dev/null

          SUB=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            | jq -r '.result.subdomain')
          WORKER_URL="https://${WORKER_NAME}.${SUB}.workers.dev"
          echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV
          echo "::notice::Worker URL: $WORKER_URL"

      - name: Smoke-test Worker URL
        run: |
          set -euo pipefail
          sleep 5
          resp=$(curl -sS "$WORKER_URL")
          echo "$resp" | jq .
          echo "$resp" | jq -e '.ok == true and .configured.token == true and .configured.secret == true and .configured.session_kv == true' > /dev/null
          echo "::notice::Worker alive — token, secret, KV configured"

      - name: Set LINE webhook URL
        continue-on-error: true
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -f -X PUT \
            https://api.line.me/v2/bot/channel/webhook/endpoint \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$WORKER_URL\"}"
          echo "::notice::Webhook URL set to $WORKER_URL"

      - name: Test webhook from LINE side
        continue-on-error: true
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -X POST \
            https://api.line.me/v2/bot/channel/webhook/test \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$WORKER_URL\"}")
          echo "$resp" | jq .
          if echo "$resp" | jq -e '.success == true' > /dev/null; then
            echo "::notice::Webhook verification: SUCCESS"
          else
            echo "::warning::Webhook test returned non-success — may still work for real events. $resp"
          fi

      - name: Deploy summary
        run: |
          echo "## Deploy complete — v3.5" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker URL | \`$WORKER_URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rich Menu ID | \`$RICH_MENU_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| KV namespace (SESSION) | \`$SESSION_KV_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| D1 database (CRM) | \`$CRM_D1_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cron | follow-ups + weekly digest + seasonal push |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## New in v3.5" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **A1** Lead scoring: 🔥hot/⚡warm/🌱cold per budget in D1 + weekly digest" >> $GITHUB_STEP_SUMMARY
          echo "- **A2** Owner quick-reply Flex: 已聯繫 / 不感興趣 / 成交 buttons on every new inquiry" >> $GITHUB_STEP_SUMMARY
          echo "- **A3** Booking flow: tap 預約諮詢 after submit → bot asks preferred time → saves to D1 + pushes owner" >> $GITHUB_STEP_SUMMARY
          echo "- **B1** Rich menu switching: new→RICHMENU_NEW, inquired→RICHMENU_INQUIRED, won→RICHMENU_CONVERTED (set secrets to enable)" >> $GITHUB_STEP_SUMMARY
          echo "- **B2** Member card: each follower gets #XXXX card with join date + tier" >> $GITHUB_STEP_SUMMARY
          echo "- **B3** Subscriber list: text 訂閱/取消訂閱; seasonal push auto-runs Mar/Jun/Sep/Dec 1st" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Manual steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Optional: set RICHMENU_NEW / RICHMENU_INQUIRED / RICHMENU_CONVERTED secrets for personalized menus" >> $GITHUB_STEP_SUMMARY
          echo "2. Self-test: add bot → step through flow → confirm submit → verify owner receives Flex with action buttons" >> $GITHUB_STEP_SUMMARY
