name: Refresh Rich Menu images (A/B/C)

# Pushes updated PNG images to existing LINE schema IDs.
# Does NOT recreate schemas — use upload-richmenu.yml when button text changes.
#
# Requires these GitHub repository secrets (set once after upload-richmenu.yml):
#   RICHMENU_NEW        — richmenu-xxx (A版 · 新朋友)
#   RICHMENU_INQUIRED   — richmenu-yyy (B版 · 詢問中)
#   RICHMENU_CONVERTED  — richmenu-zzz (C版 · 會員)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'assets/exports/3Q-HATCHERY_richmenu_a_2500x1686.png'
      - 'assets/exports/3Q-HATCHERY_richmenu_b_2500x1686.png'
      - 'assets/exports/3Q-HATCHERY_richmenu_c_2500x1686.png'

jobs:
  refresh-images:
    runs-on: ubuntu-latest
    env:
      LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify PNG files exist
        working-directory: assets/exports
        run: |
          for f in 3Q-HATCHERY_richmenu_a_2500x1686.png \
                   3Q-HATCHERY_richmenu_b_2500x1686.png \
                   3Q-HATCHERY_richmenu_c_2500x1686.png; do
            echo "  ✓ $f ($(stat -c%s "$f") bytes)"
          done

      - name: Check required secrets
        run: |
          missing=0
          for varname in RICHMENU_NEW RICHMENU_INQUIRED RICHMENU_CONVERTED; do
            val=$(eval echo "\$$varname")
            if [[ -z "$val" ]]; then
              echo "::error::GitHub secret $varname is not set."
              echo "Run upload-richmenu.yml first, then add the 3 IDs as repository secrets."
              missing=1
            fi
          done
          [[ $missing -eq 0 ]]
        env:
          RICHMENU_NEW: ${{ secrets.RICHMENU_NEW }}
          RICHMENU_INQUIRED: ${{ secrets.RICHMENU_INQUIRED }}
          RICHMENU_CONVERTED: ${{ secrets.RICHMENU_CONVERTED }}

      - name: Push A版 image (RICHMENU_NEW)
        env:
          RICHMENU_ID: ${{ secrets.RICHMENU_NEW }}
        run: |
          set -euo pipefail
          echo "▸ A版 → $RICHMENU_ID"
          resp=$(curl -fsS -w "\n%{http_code}" -X POST \
            "https://api-data.line.me/v2/bot/richmenu/$RICHMENU_ID/content" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: image/png" \
            --data-binary "@assets/exports/3Q-HATCHERY_richmenu_a_2500x1686.png")
          code=$(echo "$resp" | tail -1)
          echo "  HTTP $code"
          [[ "$code" == "200" ]] || { echo "::error::A版 upload failed (HTTP $code)"; exit 1; }

      - name: Push B版 image (RICHMENU_INQUIRED)
        env:
          RICHMENU_ID: ${{ secrets.RICHMENU_INQUIRED }}
        run: |
          set -euo pipefail
          echo "▸ B版 → $RICHMENU_ID"
          resp=$(curl -fsS -w "\n%{http_code}" -X POST \
            "https://api-data.line.me/v2/bot/richmenu/$RICHMENU_ID/content" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: image/png" \
            --data-binary "@assets/exports/3Q-HATCHERY_richmenu_b_2500x1686.png")
          code=$(echo "$resp" | tail -1)
          echo "  HTTP $code"
          [[ "$code" == "200" ]] || { echo "::error::B版 upload failed (HTTP $code)"; exit 1; }

      - name: Push C版 image (RICHMENU_CONVERTED)
        env:
          RICHMENU_ID: ${{ secrets.RICHMENU_CONVERTED }}
        run: |
          set -euo pipefail
          echo "▸ C版 → $RICHMENU_ID"
          resp=$(curl -fsS -w "\n%{http_code}" -X POST \
            "https://api-data.line.me/v2/bot/richmenu/$RICHMENU_ID/content" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: image/png" \
            --data-binary "@assets/exports/3Q-HATCHERY_richmenu_c_2500x1686.png")
          code=$(echo "$resp" | tail -1)
          echo "  HTTP $code"
          [[ "$code" == "200" ]] || { echo "::error::C版 upload failed (HTTP $code)"; exit 1; }

      - name: Summary
        env:
          RICHMENU_NEW: ${{ secrets.RICHMENU_NEW }}
          RICHMENU_INQUIRED: ${{ secrets.RICHMENU_INQUIRED }}
          RICHMENU_CONVERTED: ${{ secrets.RICHMENU_CONVERTED }}
        run: |
          {
            echo "## Rich Menu Image Refresh ✅"
            echo ""
            echo "| 版本 | Schema ID | 狀態 |"
            echo "|------|-----------|------|"
            echo "| A版 (新朋友) | \`$RICHMENU_NEW\` | 圖片已更新 |"
            echo "| B版 (詢問中) | \`$RICHMENU_INQUIRED\` | 圖片已更新 |"
            echo "| C版 (會員)   | \`$RICHMENU_CONVERTED\` | 圖片已更新 |"
            echo ""
            echo "> Schema IDs 不變，Cloudflare env vars **不需要重新填**。"
          } >> "$GITHUB_STEP_SUMMARY"
