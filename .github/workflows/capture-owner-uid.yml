name: Capture OWNER_USER_ID from KV

on:
  workflow_dispatch: {}

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KV_NAMESPACE_ID: 20a68b10afc84764ba770b64f0f33f30
    steps:
      - uses: actions/checkout@v4

      - name: Read uid from KV
        env:
          CF_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          UID_VAL=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/__last_user_uid")
          echo "Raw KV value: $UID_VAL"
          if [ -z "$UID_VAL" ] || [ "$UID_VAL" = "null" ] || [[ "$UID_VAL" == *"error"* ]]; then
            echo "::error::No userId captured in KV. Send any message to the LINE OA first."
            exit 1
          fi
          # LINE userIds look like U followed by 32 hex chars (33 chars total)
          if [[ ! "$UID_VAL" =~ ^U[0-9a-f]{32}$ ]]; then
            echo "::error::KV value doesn't look like a LINE userId: $UID_VAL"
            exit 1
          fi
          echo "CAPTURED_UID=$UID_VAL" >> $GITHUB_ENV
          echo "::notice::Captured uid: ${UID_VAL:0:6}…${UID_VAL: -4}"

      - name: Update OWNER_USER_ID secret via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pip install --quiet pynacl
          python3 <<PYEOF
          import os, json, base64, urllib.request
          from nacl import encoding, public

          repo  = os.environ['REPO']
          tok   = os.environ['GH_TOKEN']
          uid   = os.environ['CAPTURED_UID']

          # Get repo public key
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/secrets/public-key',
              headers={'Authorization': f'Bearer {tok}', 'Accept': 'application/vnd.github+json'},
          )
          with urllib.request.urlopen(req) as r:
              key_info = json.load(r)

          # Encrypt with libsodium sealed box
          pubkey = public.PublicKey(key_info['key'].encode('utf-8'), encoding.Base64Encoder())
          encrypted = public.SealedBox(pubkey).encrypt(uid.encode('utf-8'))
          enc_b64   = base64.b64encode(encrypted).decode('utf-8')

          # Set secret
          payload = json.dumps({'encrypted_value': enc_b64, 'key_id': key_info['key_id']}).encode()
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/secrets/OWNER_USER_ID',
              data=payload,
              headers={'Authorization': f'Bearer {tok}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='PUT',
          )
          with urllib.request.urlopen(req) as r:
              print(f'Secret update HTTP: {r.status}')
          PYEOF
          echo "::notice::OWNER_USER_ID secret updated"

      - name: Trigger deploy workflows to apply new secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for WF in deploy.yml deploy-fukubukuro.yml; do
            curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$WF/dispatches" \
              -d '{"ref":"main"}'
            echo "::notice::Triggered $WF"
          done
