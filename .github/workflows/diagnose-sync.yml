name: Diagnose LINE OA Sync

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check Worker health
        run: |
          echo "=== 1. Worker GET endpoint ==="
          curl -sv "https://3q-hatchery-webhook.milk790.workers.dev/" 2>&1 | tail -30
          echo ""
          echo "=== 2. Worker JSON status ==="
          curl -s "https://3q-hatchery-webhook.milk790.workers.dev/" | python3 -m json.tool || true

      - name: Check Pages PNG availability
        run: |
          for FILE in 3q-welcome-card-1040.png 3q-lucky-bag-main-1040.png 3q-campaign-poster-1080x1040.png 3q-seasonal-spring-1080x878.png; do
            echo "Checking $FILE..."
            STATUS=$(curl -sI "https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports/$FILE" | head -1)
            echo "  → $STATUS"
          done

      - name: Check LINE webhook configuration
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          echo "=== LINE webhook endpoint configured: ==="
          curl -s -H "Authorization: Bearer $LINE_TOKEN" \
            "https://api.line.me/v2/bot/channel/webhook/endpoint" | python3 -m json.tool

          echo ""
          echo "=== LINE webhook test (delivers test event to webhook): ==="
          curl -s -X POST -H "Authorization: Bearer $LINE_TOKEN" \
            "https://api.line.me/v2/bot/channel/webhook/test" | python3 -m json.tool

      - name: Verify rich menu setup
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          echo "=== Default rich menu: ==="
          curl -s -H "Authorization: Bearer $LINE_TOKEN" \
            "https://api.line.me/v2/bot/user/all/richmenu" | python3 -m json.tool
          echo ""
          echo "=== All rich menus: ==="
          curl -s -H "Authorization: Bearer $LINE_TOKEN" \
            "https://api.line.me/v2/bot/richmenu/list" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for m in d.get('richmenus',[]):
  print(f'  ID: {m[\"richMenuId\"]}, name: {m.get(\"name\")}, size: {m[\"size\"]}')"
