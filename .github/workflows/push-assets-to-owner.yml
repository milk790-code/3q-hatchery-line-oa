name: Push assets to owner LINE chat

on:
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      PNG_BASE: https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports
    steps:
      - name: Send images to owner
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
        run: |
          set -euo pipefail

          # 1. Avatar
          curl -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$OWNER_USER_ID" --arg base "$PNG_BASE" '{
              to: $t,
              messages: [
                {type: "text", text: "📸 大頭貼 (Avatar) 640×640\n\n📥 長按下圖儲存 → LINE Manager → 設定 → 帳號設定 → 點大頭貼上傳"},
                {type: "image", originalContentUrl: ($base + "/3q-avatar-640.png"), previewImageUrl: ($base + "/3q-avatar-640.png")}
              ]
            }')"

          sleep 1

          # 2. Cover
          curl -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$OWNER_USER_ID" --arg base "$PNG_BASE" '{
              to: $t,
              messages: [
                {type: "text", text: "🖼️ 封面圖 (Cover) 1080×878\n\n📥 長按下圖儲存 → LINE Manager → 設定 → 帳號設定 → 點封面照片上傳"},
                {type: "image", originalContentUrl: ($base + "/3q-cover-bowl-1080x878.png"), previewImageUrl: ($base + "/3q-cover-bowl-1080x878.png")}
              ]
            }')"

          sleep 1

          # 3. Chat background
          curl -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$OWNER_USER_ID" --arg base "$PNG_BASE" '{
              to: $t,
              messages: [
                {type: "text", text: "💬 聊天背景 (Chat BG) 1080×2340\n\n📥 長按儲存 → LINE Manager → 互動聊天介面 → 設定背景\n(此項為 LINE 商家版額外功能)"},
                {type: "image", originalContentUrl: ($base + "/3q-chat-bg-1080x2340.jpg"), previewImageUrl: ($base + "/3q-chat-bg-1080x2340.jpg")}
              ]
            }')"

          sleep 1

          # 4. Final instructions
          curl -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$OWNER_USER_ID" '{
              to: $t,
              messages: [
                {type: "text", text: "✅ 3 張關鍵素材已推送\n\n手動上傳步驟（3 分鐘）：\n\n1️⃣ 開 LINE Manager\nhttps://manager.line.biz/account/@121lkspe\n\n2️⃣ 設定 → 帳號設定\n• 點「大頭貼」→ 上傳剛存的 avatar\n• 點「封面照片」→ 上傳剛存的 cover\n• 狀態消息：只要你願意說，我們就幫你被看見。\n\n3️⃣ 回應設定 → 關閉「自動回應訊息」(Webhook 接管)\n\n4️⃣ 儲存 → 完成"}
              ]
            }')"

          echo "::notice::4 messages pushed to OWNER_USER_ID"
