name: Fix LINE channel secret on CF Worker (one-shot)

# One-shot remediation: accepts a LINE channel secret as input,
# writes it directly to the Cloudflare Worker's LINE_CHANNEL_SECRET binding
# (without re-uploading the whole script), then re-tests the webhook.
#
# Caveat: workflow_dispatch inputs are visible in the run UI to anyone with
# repo access. The provided secret is therefore considered exposed and should
# be reissued in LINE Developers Console after this workflow succeeds.

on:
  workflow_dispatch:
    inputs:
      channel_secret:
        description: 'LINE Channel Secret (Basic settings tab). Will be masked.'
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WORKER_NAME: 3q-hatchery-webhook
    steps:
      - uses: actions/checkout@v4

      - name: Mask the input secret in all subsequent logs
        env:
          IN: ${{ inputs.channel_secret }}
        run: |
          echo "::add-mask::$IN"
          echo "INPUT_LEN=${#IN}" >> "$GITHUB_ENV"

      - name: Sanity check input length
        run: |
          if [ "${INPUT_LEN}" -lt 16 ]; then
            echo "::error::Channel secret looks too short (${INPUT_LEN} chars). Aborting."
            exit 1
          fi
          echo "::notice::Input received (length=${INPUT_LEN})"

      - name: Update Cloudflare Worker binding (LINE_CHANNEL_SECRET)
        env:
          CF_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEW_SECRET:    ${{ inputs.channel_secret }}
        run: |
          set -uo pipefail
          mkdir -p _debug/fix-secret

          # PUT updates a single named secret without re-uploading the script.
          # https://developers.cloudflare.com/api/operations/worker-secret-put
          body=$(jq -nc --arg t "$NEW_SECRET" \
            '{name:"LINE_CHANNEL_SECRET", text:$t, type:"secret_text"}')

          http=$(curl -sS -o _debug/fix-secret/put-resp.json -w "%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/secrets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$body")
          echo "PUT secret HTTP $http"
          ok=$(jq -r '.success // false' _debug/fix-secret/put-resp.json)
          if [ "$ok" != "true" ]; then
            echo "::error::CF secret update failed"
            jq . _debug/fix-secret/put-resp.json
            exit 1
          fi
          echo "::notice::CF Worker secret updated"

      - name: Wait for Worker propagation
        run: sleep 8

      - name: Re-test webhook from LINE side
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -uo pipefail
          WORKER_URL="https://3q-hatchery-webhook.milk790.workers.dev"
          curl -sS -X POST \
            https://api.line.me/v2/bot/channel/webhook/test \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"endpoint\":\"$WORKER_URL\"}" \
            > _debug/fix-secret/webhook-test.json
          jq . _debug/fix-secret/webhook-test.json
          status=$(jq -r '.statusCode // empty' _debug/fix-secret/webhook-test.json)
          success=$(jq -r '.success // empty' _debug/fix-secret/webhook-test.json)
          echo "result: success=$success statusCode=$status"
          case "$status" in
            200) echo "::notice::SIGNATURE FIXED — webhook now accepts LINE events" ;;
            401) echo "::error::Still 401 — the secret value does not match. Confirm copy from Basic settings tab.";;
            ''|null) echo "::warning::No status (network)";;
            *)   echo "::warning::Got $status";;
          esac

      - name: Commit probe result (no secret)
        if: always()
        run: |
          set -euo pipefail
          # Don't commit put-resp.json — it shouldn't echo the secret but be safe
          rm -f _debug/fix-secret/put-resp.json
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add _debug/fix-secret/webhook-test.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "fix-secret: webhook-test result from run ${{ github.run_id }}"
            git push origin HEAD:main
          fi
