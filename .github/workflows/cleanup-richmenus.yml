name: Cleanup rich menus + force set default

on:
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RICH_MENU_NAME: '3Q Hatchery - 1 hero + 4 cells'
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup rich menus
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _debug/cleanup

          echo "=== 1. List all current rich menus ==="
          curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/richmenu/list \
            > _debug/cleanup/before.json
          jq '.richmenus[] | {id: .richMenuId, name, selected}' _debug/cleanup/before.json

          echo
          echo "=== 2. Identify keeper (last matching $RICH_MENU_NAME) ==="
          mapfile -t OURS < <(jq -r --arg n "$RICH_MENU_NAME" \
            '.richmenus[] | select(.name == $n) | .richMenuId' _debug/cleanup/before.json)
          if [ ${#OURS[@]} -eq 0 ]; then
            echo "::error::No rich menu with name '$RICH_MENU_NAME' found. Re-run deploy.yml first."
            exit 1
          fi
          KEEP="${OURS[-1]}"
          echo "KEEP=$KEEP"
          echo "$KEEP" > _debug/cleanup/keep-id.txt

          echo
          echo "=== 3. Verify keeper has binary uploaded ==="
          set +e
          http=$(curl -sS -X GET \
            "https://api-data.line.me/v2/bot/richmenu/${KEEP}/content" \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -o /tmp/probe-binary -w "%{http_code}")
          set -e
          echo "GET binary HTTP $http"
          if [ "$http" = "200" ]; then
            ls -la /tmp/probe-binary
            echo "binary exists ($(wc -c < /tmp/probe-binary) bytes)"
          else
            echo "::warning::keeper $KEEP has no binary (http=$http). Uploading..."
            set +e
            up_http=$(curl -sS -X POST \
              "https://api-data.line.me/v2/bot/richmenu/${KEEP}/content" \
              -H "Authorization: Bearer $LINE_TOKEN" \
              -H "Content-Type: image/jpeg" \
              --data-binary @assets/exports/3q-richmenu-2500x1686.jpg \
              -o _debug/cleanup/binary-upload.json -w "%{http_code}")
            set -e
            echo "upload HTTP $up_http"
            cat _debug/cleanup/binary-upload.json 2>/dev/null
            if [ "$up_http" != "200" ]; then
              echo "::error::Failed to upload binary to $KEEP"
              exit 1
            fi
          fi

          echo
          echo "=== 4. Delete all OTHER rich menus ==="
          mapfile -t ALL_IDS < <(jq -r '.richmenus[].richMenuId' _debug/cleanup/before.json)
          : > _debug/cleanup/deletes.log
          for id in "${ALL_IDS[@]}"; do
            if [ "$id" = "$KEEP" ]; then
              echo "(keeping $id)"
              continue
            fi
            echo "Deleting $id"
            set +e
            http=$(curl -sS -X DELETE \
              "https://api.line.me/v2/bot/richmenu/$id" \
              -H "Authorization: Bearer $LINE_TOKEN" \
              -o "_debug/cleanup/delete-${id}.json" -w "%{http_code}")
            set -e
            echo "  HTTP $http"
            echo "$http $id" >> _debug/cleanup/deletes.log
          done

          echo
          echo "=== 5. Set keeper as default for all users (via Python urllib) ==="
          # curl-based POST returns HTTP 411 from Akamai edge for this endpoint regardless of -d "" or -H "Content-Length: 0".
          # Python's urllib reliably sends a proper POST with explicit empty body + Content-Length: 0.
          set +e
          python3 <<PY > _debug/cleanup/setdefault.json 2>&1
          import os, sys, json, urllib.request, urllib.error
          keep = "$KEEP"
          token = os.environ["LINE_TOKEN"]
          req = urllib.request.Request(
              f"https://api.line.me/v2/bot/user/all/richmenu/{keep}",
              data=b"", method="POST",
              headers={"Authorization": f"Bearer {token}", "Content-Length": "0"}
          )
          try:
              with urllib.request.urlopen(req) as r:
                  body = r.read().decode("utf-8", errors="replace") or "{}"
                  sys.stderr.write(f"HTTP_CODE={r.status}\n")
                  print(body)
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              sys.stderr.write(f"HTTP_CODE={e.code}\n")
              print(body)
          PY
          py_exit=$?
          set -e
          # Extract HTTP_CODE from stderr (captured via 2>&1)
          http=$(grep -oP "HTTP_CODE=\K\d+" _debug/cleanup/setdefault.json | tail -1 || echo "?")
          echo "$http" > _debug/cleanup/setdefault-http.txt
          echo "HTTP $http (py_exit=$py_exit)"
          cat _debug/cleanup/setdefault.json
          echo
          echo "HTTP $http"
          echo "$http" > _debug/cleanup/setdefault-http.txt
          cat _debug/cleanup/setdefault.json
          echo

          echo
          echo "=== 6. Verify final list ==="
          curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/richmenu/list \
            > _debug/cleanup/after.json
          jq '.richmenus[] | {id: .richMenuId, name, selected}' _debug/cleanup/after.json

          echo
          echo "=== 7. Verify default endpoint ==="
          curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/user/all/richmenu \
            > _debug/cleanup/current-default.json
          cat _debug/cleanup/current-default.json

      - name: Commit cleanup results
        if: always()
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add _debug/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "cleanup: rich menu state after run ${{ github.run_id }}"
            git push origin HEAD:main
          fi
