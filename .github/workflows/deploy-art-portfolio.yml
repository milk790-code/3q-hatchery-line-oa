name: Deploy Art Portfolio

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'workers/art-portfolio/worker.js'
      - '.github/workflows/deploy-art-portfolio.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_NAME: 3q-art-portfolio
      SEATS_KV_ID: 6347df00f8d34c4eaae5428decafc653
      AI_SERVICE: 3q-ai-subsidy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          jq -n --arg kv "$SEATS_KV_ID" --arg ai "$AI_SERVICE" '{ main_module:"worker.js", compatibility_date:"2024-12-04",
            bindings:[ {name:"KV",type:"kv_namespace",namespace_id:$kv},
                       {name:"AI",type:"service",service:$ai,environment:"production"} ] }' > /tmp/meta.json
          resp=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=@/tmp/meta.json;type=application/json" \
            -F "worker.js=@workers/art-portfolio/worker.js;type=application/javascript+module")
          echo "$resp" | jq -e '.success==true' >/dev/null || { echo "$resp" | jq -c '.errors'; exit 1; }
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d '{"enabled":true}' | jq -e '.success==true' >/dev/null
          sleep 5
          curl -sS "https://${WORKER_NAME}.milk790.workers.dev/health" | jq -e '.ok==true and .v==2' >/dev/null
          echo "::notice::3q-art-portfolio deployed + health OK"
