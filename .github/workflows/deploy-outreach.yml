name: Deploy outreach worker

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'workers/outreach/worker.js'
      - 'data/subsidies.json'
      - '.github/workflows/deploy-outreach.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_NAME: 3q-outreach
      SESSION_KV_ID: 20a68b10afc84764ba770b64f0f33f30
      CRM_D1_ID: e54671b1-d15e-4552-babf-cef367267568
    steps:
      - uses: actions/checkout@v4
      - name: Sync gate(data/subsidies.json ↔ CATALOG 漂移即擋)
        run: node scripts/check-sync.mjs
      - name: Set CF account ID
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: echo "CF_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV
      - name: Deploy (inherit-safe secrets)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
        run: |
          set -euo pipefail
          existing=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/settings" \
            | jq -c '[.result.bindings[]? | select(.type=="secret_text") | .name]' || echo '[]')
          secrets_json=$(jq -n --argjson existing "$existing" '
            [ {name:"LINE_CHANNEL_ACCESS_TOKEN",val:(env.LINE_CHANNEL_ACCESS_TOKEN//"")},
              {name:"OWNER_USER_ID",val:(env.OWNER_USER_ID//"")} ]
            | map( if .val!="" then {name:.name,type:"secret_text",text:.val}
                   elif ([.name]|inside($existing)) then {name:.name,type:"inherit"}
                   else empty end )')
          jq -n --argjson secrets "$secrets_json" --arg kv "$SESSION_KV_ID" --arg d1 "$CRM_D1_ID" '
            { main_module:"worker.js", compatibility_date:"2024-12-01",
              bindings: ([ {name:"SESSION",type:"kv_namespace",namespace_id:$kv},
                           {name:"CRM",type:"d1",id:$d1} ] + $secrets) }' > /tmp/meta.json
          resp=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=@/tmp/meta.json;type=application/json" \
            -F "worker.js=@workers/outreach/worker.js;type=application/javascript+module")
          echo "$resp" | jq -e '.success==true' >/dev/null || { echo "$resp" | jq -c '.errors'; exit 1; }
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d '{"enabled":true}' | jq -e '.success==true' >/dev/null
      - name: Set cron triggers (daily card 08:30 TW / SLA 30min / weekly MON 09:00 TW)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/schedules" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d '[{"cron":"30 0 * * *"},{"cron":"*/30 * * * *"},{"cron":"0 1 * * MON"}]' \
            | jq -e '.success==true' >/dev/null
          echo "::notice::3q-outreach deployed — crons: 00:30 UTC daily card / */30 SLA nudge / MON 01:00 UTC weekly report (named days; CF cron is Quartz-style)"
