name: Apply D1 migration 002

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      D1_ID: e54671b1-d15e-4552-babf-cef367267568
    steps:
      - uses: actions/checkout@v4

      - name: Apply 002 migration statement-by-statement
        env:
          CF_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          mkdir -p _debug/d1-002

          run_sql() {
            local sql="$1"
            local label="$2"
            echo "=== $label ==="
            curl -sS -X POST -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database/$D1_ID/query" \
              -d "$(jq -cn --arg s "$sql" '{sql: $s}')" \
              | tee "_debug/d1-002/$(echo $label | tr ' ' '_').json" | jq -r '.success, .errors[0].message // empty'
          }

          # ALTER statements (will fail silently if column exists, that's OK)
          run_sql "ALTER TABLE inquiries ADD COLUMN followed_up_24h INTEGER DEFAULT 0" "add 24h col" || true
          run_sql "ALTER TABLE inquiries ADD COLUMN followed_up_72h INTEGER DEFAULT 0" "add 72h col" || true
          run_sql "ALTER TABLE inquiries ADD COLUMN followed_up_168h INTEGER DEFAULT 0" "add 168h col" || true

          # CREATE TABLE campaigns
          run_sql "CREATE TABLE IF NOT EXISTS campaigns (id INTEGER PRIMARY KEY AUTOINCREMENT, user_id TEXT NOT NULL, tier TEXT NOT NULL, price INTEGER NOT NULL, sample_pick TEXT, fulfilled INTEGER DEFAULT 0, created_at TEXT NOT NULL DEFAULT (datetime('now')))" "create campaigns"

          run_sql "CREATE INDEX IF NOT EXISTS idx_campaigns_user_id ON campaigns(user_id)" "idx user_id"
          run_sql "CREATE INDEX IF NOT EXISTS idx_campaigns_created_at ON campaigns(created_at)" "idx created_at"

          # Verify
          echo "=== Final inquiries schema ==="
          curl -sS -X POST -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database/$D1_ID/query" \
            -d '{"sql": "PRAGMA table_info(inquiries)"}' \
            | tee _debug/d1-002/inquiries-info.json | jq -r '.result[0].results[].name'

          echo "=== Final tables ==="
          curl -sS -X POST -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database/$D1_ID/query" \
            -d '{"sql": "SELECT name FROM sqlite_master WHERE type=\"table\""}' \
            | tee _debug/d1-002/tables.json | jq -r '.result[0].results[].name'

      - name: Commit debug
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _debug/d1-002/
          git diff --cached --quiet || git commit -m "d1-002: migration debug"
          git push || true
