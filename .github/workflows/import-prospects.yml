name: Import prospects to outreach

# PROSPECTS.md(名單正本)→ 兩套 CRM 同步投餵:
#   ① 3q-outreach 名單池(每日卡片/序列/SLA 引擎)— src upsert
#   ② 3q-line-oa prospects 表(老闆 LINE 指令:陌開/詳情/狀態)— (pool,list_no) upsert
# 兩端都是 upsert:重跑只更新名單欄位,不動 status/備註 → 任意次觸發安全。
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'PROSPECTS.md'
      - 'scripts/prospects-to-outreach.mjs'
      - 'scripts/prospects-import.mjs'
      - '.github/workflows/import-prospects.yml'

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      OUTREACH_URL: https://3q-outreach.milk790.workers.dev
    steps:
      - uses: actions/checkout@v4
      - name: Verify bridge mapping (17 checks against PROSPECTS.md)
        run: node scripts/test-prospects-to-outreach.mjs
      - name: Wait for worker >= v1.1 (upsert import live)
        run: |
          for i in $(seq 1 24); do
            ver=$(curl -sm10 "$OUTREACH_URL/health" | jq -r '.ver // empty' || true)
            echo "try$i ver=$ver"
            case "$ver" in v1.0|'') sleep 5 ;; *) exit 0 ;; esac
          done
          echo '::error::worker 還在 v1.0(無 upsert),不匯入以免重複'; exit 1
      - name: Feed outreach engine (upsert by src)
        run: node scripts/prospects-to-outreach.mjs --post "$OUTREACH_URL"
      - name: Feed 3q-line-oa prospects CRM (upsert by pool,list_no)
        run: node scripts/prospects-import.mjs --post https://3q-line-oa.milk790.workers.dev --key 3q-setup-8m4w2r
