name: Inspect Rich Menu URLs
on:
  workflow_dispatch: {}
jobs:
  inspect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: List all rich menus and their tap zones
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _debug/richmenu
          curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/richmenu/list \
            | tee _debug/richmenu/list.json \
            | jq '.richmenus[] | {id: .richMenuId, name: .name, areas: [.areas[] | {bounds, action}]}'
          curl -sS -H "Authorization: Bearer $LINE_TOKEN" \
            https://api.line.me/v2/bot/user/all/richmenu \
            | tee _debug/richmenu/default.json | jq .

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _debug/richmenu/
          git diff --cached --quiet || git commit -m "diag: rich menu URLs snapshot"
          git push || true
