name = "luxury-line-oa"
main = "src/index.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Workers KV（共用 或 另開）
[[kv_namespaces]]
binding = "KV"
id      = "d986024268764cfb9c68f0e886731367"  # cdg-kv（共用）

# 環境變數（敏感值用 wrangler secret put 寫入，不要放這裡）
[vars]
# 非敏感設定可放這裡，目前留空

# Secrets（用下面的 wrangler 指令設定）：
#   wrangler secret put LINE_CHANNEL_SECRET
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   wrangler secret put ADMIN_KEY
