<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Magic Editor — Words that catch fire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap"/>
<style>
  :root {
    --bg-0: #07060A;
    --bg-1: #0E0C12;
    --bg-2: #14111A;
    --rule: rgba(255,255,255,0.08);
    --ink: #E9E4D8;
    --ink-mute: #8B8478;
    --gold: #C49A4A;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg-0); color: var(--ink); font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  /* Ambient stage bg */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(60% 50% at 20% 10%, rgba(196,154,74,0.06), transparent 70%),
      radial-gradient(50% 40% at 80% 90%, rgba(120,180,255,0.04), transparent 70%);
  }

  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 56px 48px;
    gap: 36px;
    max-width: 1280px; margin: 0 auto;
  }

  header { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  header .l { display: flex; flex-direction: column; gap: 8px; }
  header .eyebrow { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); }
  header h1 {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300; font-size: 56px; letter-spacing: 0.02em; line-height: 1; margin: 0;
    color: var(--ink);
  }
  header h1 em { font-style: italic; color: var(--gold); }
  header .r { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-mute); max-width: 320px; text-align: right; line-height: 1.7; }

  /* Editor card */
  .card {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 64px 80px 72px;
    flex: 1;
    min-height: 540px;
    overflow: hidden;
  }
  .card::before, .card::after {
    content: ""; position: absolute; width: 28px; height: 28px; pointer-events: none;
    border: 1px solid var(--gold); opacity: 0.65;
  }
  .card::before { top: 8px; left: 8px; border-right: 0; border-bottom: 0; }
  .card::after  { bottom: 8px; right: 8px; border-left: 0; border-top: 0; }

  /* The editor itself */
  .editor {
    font-family: "Cormorant Garamond", "EB Garamond", serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.6;
    letter-spacing: 0.005em;
    color: var(--ink);
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
    caret-color: var(--gold);
    min-height: 420px;
    position: relative;
    z-index: 1;
  }
  .editor::selection,
  .editor *::selection { background: rgba(196,154,74,0.32); color: inherit; }

  /* Floating particle overlay — covers the whole card */
  .pcanvas {
    position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2;
  }

  /* =================================================================
     Trigger-word effect styles
     ================================================================= */
  .fx { position: relative; display: inline-block; padding: 0 .04em; }

  /* FIRE */
  .fx-fire {
    background: linear-gradient(180deg, #FFE39A 0%, #FF8A1F 40%, #E53212 75%, #8C1306 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow:
      0 0 12px rgba(255,120,30,0.55),
      0 0 28px rgba(255,80,20,0.35);
    animation: fireFlick 130ms steps(2,end) infinite;
  }
  @keyframes fireFlick { 0% { filter: brightness(1.0); } 50% { filter: brightness(1.15); } 100% { filter: brightness(0.95); } }

  /* SMOKE */
  .fx-smoke {
    background: linear-gradient(180deg, #C8C6C2 0%, #6E6C68 60%, #3E3C38 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: blur(.2px);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    animation: smokeBreath 2400ms ease-in-out infinite;
  }
  @keyframes smokeBreath {
    0%, 100% { opacity: 0.92; letter-spacing: 0.005em; }
    50%      { opacity: 0.78; letter-spacing: 0.04em; }
  }

  /* METAL */
  .fx-metal {
    background:
      linear-gradient(180deg, #FFFFFF 0%, #C8CDD2 18%, #8A9099 38%, #E2E5E8 58%, #5C6168 78%, #C8CDD2 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2), 0 0 14px rgba(180,200,220,0.35);
  }

  /* WIND */
  .fx-wind {
    background: linear-gradient(90deg, rgba(180,220,255,0.4) 0%, #E8F1FA 50%, rgba(180,220,255,0.4) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 10px rgba(180,210,255,0.35);
    animation: windPan 1.6s linear infinite;
  }
  @keyframes windPan { from { background-position: 100% 0; } to { background-position: -100% 0; } }

  /* WATER */
  .fx-water {
    background: linear-gradient(180deg, #BEE6FF 0%, #4FA3DA 55%, #1A4F7A 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 14px rgba(80,160,220,0.45);
    animation: waterShimmer 3s ease-in-out infinite;
  }
  @keyframes waterShimmer {
    0%, 100% { filter: hue-rotate(0deg) brightness(1.0); }
    50%      { filter: hue-rotate(8deg) brightness(1.08); }
  }

  /* LIGHTNING */
  .fx-lightning {
    background: linear-gradient(180deg, #FFFFFF 0%, #DEC6FF 40%, #8B6FE6 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow:
      0 0 8px rgba(220,200,255,0.85),
      0 0 22px rgba(180,140,255,0.6);
    animation: lightFlash 2.8s steps(1, end) infinite;
  }
  @keyframes lightFlash {
    0%, 88% { filter: brightness(1); }
    89%, 92% { filter: brightness(1.8) saturate(1.4); }
    93%, 100% { filter: brightness(1); }
  }

  /* ICE */
  .fx-ice {
    background: linear-gradient(180deg, #FFFFFF 0%, #D5ECFF 35%, #88B8E0 70%, #C8DEEF 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow:
      0 0 10px rgba(200,230,255,0.6),
      0 1px 0 rgba(255,255,255,0.4);
  }

  /* GOLD */
  .fx-gold {
    background: linear-gradient(180deg, #FFEBA8 0%, #E2B441 35%, #8C5F1A 70%, #E2B441 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 12px rgba(220,160,60,0.4);
    animation: goldShine 3.4s linear infinite;
  }
  @keyframes goldShine {
    0%   { filter: brightness(1.0); }
    50%  { filter: brightness(1.15); }
    100% { filter: brightness(1.0); }
  }

  /* Legend strip */
  .legend {
    display: flex; flex-wrap: wrap; gap: 18px 28px;
    font-family: "Inter", sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .legend .key { font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 400; font-size: 18px; letter-spacing: 0.05em; text-transform: lowercase; margin-right: 10px; padding: 0 .15em; }

  .legend .row { display: inline-flex; align-items: baseline; gap: 4px; }
  .legend .row .verb { color: var(--ink-mute); font-size: 10px; }

  footer { display: flex; justify-content: space-between; align-items: center; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-mute); padding-top: 12px; border-top: 1px solid var(--rule); }
  footer .dot { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); margin: 0 12px; vertical-align: middle; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useEffect, useRef, useState, useLayoutEffect } = React;

// ===========================================================================
// Triggers — case-insensitive whole-word matches. Order matters only for regex.
// ===========================================================================
const TRIGGERS = [
  { word: 'fire',      cls: 'fx-fire' },
  { word: 'smoke',     cls: 'fx-smoke' },
  { word: 'metal',     cls: 'fx-metal' },
  { word: 'wind',      cls: 'fx-wind' },
  { word: 'water',     cls: 'fx-water' },
  { word: 'lightning', cls: 'fx-lightning' },
  { word: 'ice',       cls: 'fx-ice' },
  { word: 'gold',      cls: 'fx-gold' },
];
const TRIGGER_RE = new RegExp(`\\b(${TRIGGERS.map(t => t.word).join('|')})\\b`, 'gi');
const KIND_OF = (word) => {
  const m = TRIGGERS.find(t => t.word === word.toLowerCase());
  return m ? m.cls.replace(/^fx-/, '') : null;
};

const SAMPLE = `The candle's fire flickered against the cold stone wall. A trail of smoke drifted upward, dissolving into the rafters. Below the window, a chest of dark metal stood half-open, its hinges singing faintly when the wind found them.

Outside, water tapped a quiet rhythm against the slate. Far off, lightning split the sky for a heartbeat, then vanished. A breath of ice slipped under the door — and inside the chest, the locket was gold, older than anyone in the house remembered.

Try typing: fire · smoke · metal · wind · water · lightning · ice · gold`;

// ===========================================================================
// Caret offset save / restore (works across re-rendered innerHTML)
// ===========================================================================
function getCaretChars(root) {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return null;
  const range = sel.getRangeAt(0);
  if (!root.contains(range.endContainer)) return null;
  const pre = range.cloneRange();
  pre.selectNodeContents(root);
  pre.setEnd(range.endContainer, range.endOffset);
  return pre.toString().length;
}
function setCaretChars(root, chars) {
  if (chars == null) return;
  let remaining = chars;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  let node;
  while ((node = walker.nextNode())) {
    const len = node.nodeValue.length;
    if (remaining <= len) {
      const range = document.createRange();
      range.setStart(node, remaining);
      range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      return;
    }
    remaining -= len;
  }
  // fall back to end
  const range = document.createRange();
  range.selectNodeContents(root);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ===========================================================================
// Text → HTML with wrapped trigger words. Newlines preserved as <br>.
// ===========================================================================
function escapeHTML(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function buildHTML(text) {
  let out = '';
  let last = 0;
  text.replace(TRIGGER_RE, (m, _w, off) => {
    out += escapeHTML(text.slice(last, off)).replace(/\n/g, '<br>');
    const cls = KIND_OF(m);
    out += `<span class="fx fx-${cls}" data-fx="${cls}">${escapeHTML(m)}</span>`;
    last = off + m.length;
    return m;
  });
  out += escapeHTML(text.slice(last)).replace(/\n/g, '<br>');
  return out;
}

// ===========================================================================
// PARTICLE SYSTEM
// ===========================================================================
class Particle {
  constructor(o) { Object.assign(this, o); this.born = performance.now(); }
  alive(now) { return now - this.born < this.life; }
  ageNorm(now) { return Math.min(1, (now - this.born) / this.life); }
}

// Spawn rates per word (px-of-baseline per second, ie. how many particles to emit per word per second)
const SPAWN_RATE = {
  fire:      45,  // dense
  smoke:     12,
  metal:     3,   // sparse sparks
  wind:      28,
  water:     8,
  lightning: 0,   // event-driven flashes, not steady particles
  ice:       6,
  gold:      8,
};

function spawnFor(kind, rect, now) {
  const w = rect.width, h = rect.height;
  const x = rect.left + Math.random() * w;
  const baseline = rect.top + h * 0.95;
  switch (kind) {
    case 'fire': return new Particle({
      kind, x: x, y: baseline,
      vx: (Math.random() - 0.5) * 14,
      vy: -40 - Math.random() * 60,
      ay: -30,
      size: 2 + Math.random() * 4,
      life: 900 + Math.random() * 600,
      hueShift: Math.random() * 30,
    });
    case 'smoke': return new Particle({
      kind, x: x, y: rect.top + h * 0.5,
      vx: (Math.random() - 0.5) * 20,
      vy: -10 - Math.random() * 25,
      ay: -6,
      size: 14 + Math.random() * 22,
      life: 2200 + Math.random() * 1200,
      rot: Math.random() * Math.PI,
      rotV: (Math.random() - 0.5) * 0.4,
    });
    case 'metal': return new Particle({
      kind, x: x, y: rect.top + Math.random() * h,
      vx: (Math.random() - 0.5) * 280,
      vy: -80 - Math.random() * 120,
      ay: 380,
      size: 1.4,
      life: 480 + Math.random() * 220,
    });
    case 'wind': return new Particle({
      kind, x: rect.left - 40,
      y: rect.top + Math.random() * h,
      vx: 280 + Math.random() * 220,
      vy: (Math.random() - 0.5) * 6,
      ay: 0,
      size: 0.6 + Math.random() * 0.8,
      length: 18 + Math.random() * 36,
      life: 700 + Math.random() * 300,
    });
    case 'water': return new Particle({
      kind, x: x, y: rect.top + h * 0.95,
      vx: (Math.random() - 0.5) * 6,
      vy: 40 + Math.random() * 50,
      ay: 320,
      size: 2 + Math.random() * 2,
      life: 1100,
    });
    case 'ice': return new Particle({
      kind, x: rect.left + Math.random() * w,
      y: rect.top - 8 - Math.random() * 8,
      vx: (Math.random() - 0.5) * 14,
      vy: 18 + Math.random() * 22,
      size: 1 + Math.random() * 1.6,
      life: 2400 + Math.random() * 1000,
      twinkle: Math.random() * Math.PI * 2,
    });
    case 'gold': return new Particle({
      kind, x: rect.left + Math.random() * w,
      y: rect.top + Math.random() * h,
      vx: (Math.random() - 0.5) * 10,
      vy: -6 - Math.random() * 14,
      size: 1.2 + Math.random() * 1.4,
      life: 1400 + Math.random() * 800,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
  return null;
}

function drawParticle(ctx, p, now) {
  const t = p.ageNorm(now);
  switch (p.kind) {
    case 'fire': {
      const r = p.size * (1.6 - t * 0.9);
      const a = 1 - t;
      // hot core + warm halo
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
      const h = 36 + p.hueShift - t * 28; // yellow → red
      grd.addColorStop(0, `hsla(${h}, 100%, 75%, ${a})`);
      grd.addColorStop(0.4, `hsla(${h - 18}, 100%, 55%, ${a * 0.6})`);
      grd.addColorStop(1, `hsla(${h - 30}, 100%, 40%, 0)`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, r * 4, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'smoke': {
      const r = p.size * (1 + t * 1.4);
      const a = (1 - t) * 0.35;
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
      grd.addColorStop(0, `rgba(180,176,170,${a})`);
      grd.addColorStop(1, `rgba(60,58,54,0)`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'metal': {
      const a = 1 - t;
      ctx.fillStyle = `rgba(255,250,210,${a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      // tiny trail
      ctx.strokeStyle = `rgba(255,220,150,${a * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02); ctx.stroke();
      break;
    }
    case 'wind': {
      const a = (1 - t) * 0.7;
      ctx.strokeStyle = `rgba(220,236,255,${a})`;
      ctx.lineWidth = p.size;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.length, p.y); ctx.stroke();
      break;
    }
    case 'water': {
      const a = 1 - t * 0.6;
      ctx.fillStyle = `rgba(140,200,240,${a})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * 0.6, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'ice': {
      const a = (1 - t) * (0.6 + 0.4 * Math.sin(p.twinkle + now * 0.008));
      ctx.fillStyle = `rgba(230,244,255,${Math.max(0,a)})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'gold': {
      const a = (1 - t) * (0.55 + 0.45 * Math.sin(p.twinkle + now * 0.01));
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
      grd.addColorStop(0, `rgba(255,230,140,${Math.max(0,a)})`);
      grd.addColorStop(1, `rgba(180,130,50,0)`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(255,240,180,${Math.max(0,a)})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      break;
    }
  }
}

// One-shot "events" — lightning bolts are spawned occasionally per span.
function shouldFireBolt(state, key, now) {
  const last = state[key] || 0;
  // every 1800-3000ms per word
  if (now - last > 1800 + Math.random() * 1200) {
    state[key] = now;
    return true;
  }
  return false;
}

function drawBolt(ctx, rect, now, age) {
  if (age > 280) return;
  const a = age < 60 ? age / 60 : (1 - (age - 60) / 220);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = `rgba(220,200,255,${Math.max(0,a)})`;
  ctx.lineWidth = 1.4;
  ctx.shadowColor = `rgba(180,140,255,${Math.max(0,a)})`;
  ctx.shadowBlur = 18;
  ctx.beginPath();
  const x0 = rect.left + Math.random() * rect.width;
  let y = rect.top - 20;
  const yEnd = rect.bottom + 12;
  ctx.moveTo(x0, y);
  let x = x0;
  while (y < yEnd) {
    y += 6 + Math.random() * 10;
    x += (Math.random() - 0.5) * 18;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();
}

// ===========================================================================
// APP
// ===========================================================================
function App() {
  const editorRef = useRef(null);
  const canvasRef = useRef(null);
  const particlesRef = useRef([]);
  const lastTickRef = useRef(performance.now());
  const accumRef = useRef({}); // per-kind spawn accumulator (per-span actually)
  const boltStateRef = useRef({});
  const [text, setText] = useState(SAMPLE);
  const lastHTMLRef = useRef('');

  // Build HTML once per text change, restoring caret afterward
  const renderEditorHTML = (newText) => {
    const el = editorRef.current;
    if (!el) return;
    const caret = getCaretChars(el);
    const html = buildHTML(newText);
    if (html !== lastHTMLRef.current) {
      el.innerHTML = html;
      lastHTMLRef.current = html;
    }
    setCaretChars(el, caret);
  };

  // Initial render
  useEffect(() => { renderEditorHTML(text); }, []); // eslint-disable-line

  // Sync on text change (after typing)
  useEffect(() => { renderEditorHTML(text); }, [text]);

  // Input handler
  const onInput = () => {
    const el = editorRef.current;
    if (!el) return;
    // Extract plain text — replace <br>s with \n
    const tmp = el.cloneNode(true);
    tmp.querySelectorAll('br').forEach(b => b.replaceWith('\n'));
    const t = tmp.textContent || '';
    setText(t);
  };

  // Animation loop
  useEffect(() => {
    const canvas = canvasRef.current;
    const editor = editorRef.current;
    if (!canvas || !editor) return;
    const ctx = canvas.getContext('2d');
    let raf;

    const resize = () => {
      const r = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = r.width * dpr;
      canvas.height = r.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    const loop = () => {
      const now = performance.now();
      const dt = Math.min(64, now - lastTickRef.current) / 1000;
      lastTickRef.current = now;

      // collect active spans + bounding rects (relative to canvas)
      const cardRect = canvas.getBoundingClientRect();
      const spans = editor.querySelectorAll('.fx');
      const spanInfos = [];
      spans.forEach((s) => {
        // a span can break across lines — use client rects to spawn across each line piece
        const rects = s.getClientRects();
        const kind = s.dataset.fx;
        const id = s.dataset.id || (s.dataset.id = String(Math.random()));
        for (let i = 0; i < rects.length; i++) {
          const r = rects[i];
          spanInfos.push({
            kind,
            key: id + '_' + i,
            rect: {
              left: r.left - cardRect.left,
              top: r.top - cardRect.top,
              right: r.right - cardRect.left,
              bottom: r.bottom - cardRect.top,
              width: r.width,
              height: r.height,
            },
          });
        }
      });

      // spawn particles per span (rate-based)
      const acc = accumRef.current;
      for (const s of spanInfos) {
        const rate = SPAWN_RATE[s.kind] || 0;
        const widthFactor = Math.max(1, s.rect.width / 80); // wider words → more particles
        const k = s.key;
        acc[k] = (acc[k] || 0) + rate * widthFactor * dt;
        while (acc[k] >= 1) {
          acc[k] -= 1;
          const p = spawnFor(s.kind, s.rect, now);
          if (p) particlesRef.current.push(p);
        }
      }

      // step particles
      const alive = [];
      for (const p of particlesRef.current) {
        p.vx += (p.ax || 0) * dt;
        p.vy += (p.ay || 0) * dt;
        p.x  += p.vx * dt;
        p.y  += p.vy * dt;
        if (p.rotV) p.rot = (p.rot || 0) + p.rotV * dt;
        if (p.alive(now)) alive.push(p);
      }
      particlesRef.current = alive;

      // draw
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const p of particlesRef.current) {
        if (p.kind === 'smoke' || p.kind === 'water') continue;
        drawParticle(ctx, p, now);
      }
      ctx.restore();
      // non-additive layer (smoke, water)
      for (const p of particlesRef.current) {
        if (p.kind !== 'smoke' && p.kind !== 'water') continue;
        drawParticle(ctx, p, now);
      }

      // lightning bolts — per-span event
      for (const s of spanInfos) {
        if (s.kind !== 'lightning') continue;
        const k = s.key + '_bolt';
        if (shouldFireBolt(boltStateRef.current, k, now)) {
          boltStateRef.current[k + '_start'] = now;
          boltStateRef.current[k + '_rect']  = { ...s.rect };
        }
        const start = boltStateRef.current[k + '_start'];
        if (start != null) {
          drawBolt(ctx, boltStateRef.current[k + '_rect'], now, now - start);
        }
      }

      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);

    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  return (
    <div className="stage">
      <header>
        <div className="l">
          <div className="eyebrow">An incantation editor · prototype</div>
          <h1>Words that <em>catch fire</em></h1>
        </div>
        <div className="r">
          Type into the page. Certain words ignite, drift, freeze, or shimmer on contact.
        </div>
      </header>

      <div className="card">
        <canvas ref={canvasRef} className="pcanvas"/>
        <div
          ref={editorRef}
          className="editor"
          contentEditable
          suppressContentEditableWarning
          spellCheck={false}
          onInput={onInput}
        />
      </div>

      <div className="legend">
        {TRIGGERS.map((t) => (
          <span key={t.word} className="row">
            <span className={`key fx ${t.cls}`}>{t.word}</span>
            <span className="verb">— live</span>
          </span>
        ))}
      </div>

      <footer>
        <span>MAGIC EDITOR</span>
        <span><span className="dot"/>BUILT FOR TYPING<span className="dot"/></span>
        <span>v 0.1</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
