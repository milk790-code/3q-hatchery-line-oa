<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #0A0A0A; color: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; align-items: end; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cell img { width: 56px; height: 56px; }
  .nm { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #8A8A8A; }
  .ax { font-family: var(--font-serif); font-style: italic; font-size: 11px; color: #B8924A; margin-top: -6px; }
</style>
</head><body>
<div class="l">Hairline Iconography — 1.5px gold, 80×80, outline only</div>
<div class="row">
  <div class="cell"><img src="../assets/icons/consultation.svg"><div class="nm">諮詢</div></div>
  <div class="cell"><img src="../assets/icons/camera.svg"><div class="nm">生圖</div></div>
  <div class="cell"><img src="../assets/icons/compass.svg"><div class="nm">行銷</div></div>
  <div class="cell"><img src="../assets/icons/clock.svg"><div class="nm">進度</div></div>
  <div class="cell"><img src="../assets/icons/envelope.svg"><div class="nm">訊息</div></div>
  <div class="cell"><img src="../assets/icons/arrow-right.svg"><div class="nm">繼續</div></div>
</div>
</body></html>
