<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: #0A0A0A; color: #F5F2EC; font-family: var(--font-sans); }
  .wrap { display: grid; grid-template-columns: 200px 1fr; gap: 32px; align-items: center; }
  .chip { aspect-ratio: 1/1; background: #B8924A; }
  .label { font-family: var(--font-serif); font-weight: 300; font-size: 36px; letter-spacing: 0.15em; }
  .en { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.6; margin-top: 6px; }
  .hex { font-size: 12px; letter-spacing: 0.2em; margin-top: 18px; color: #B8924A; }
  .rule { display: flex; align-items: center; gap: 16px; margin-top: 18px; }
  .rule-line { height: 1px; width: 60px; background: #B8924A; }
  .rule-text { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #B8924A; }
  .warn { margin-top: 14px; font-size: 11px; letter-spacing: 0.05em; opacity: 0.55; line-height: 1.7; }
</style>
</head><body>
<div class="wrap">
  <div class="chip"></div>
  <div>
    <div class="label">孵化金</div>
    <div class="en">Hatchery Gold — line use only</div>
    <div class="hex">#B8924A</div>
    <div class="rule"><div class="rule-line"></div><div class="rule-text">≤ 3% of any composition</div></div>
    <div class="warn">Hairlines, dividers, signatures. Never used as a fill.<br>Never gradient. Never championed-gold or rose-gold variants.</div>
  </div>
</div>
</body></html>
