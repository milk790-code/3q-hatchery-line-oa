<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; gap: 16px; padding: 14px 0; border-bottom: 1px solid rgba(10,10,10,0.08); }
  .row:last-child { border: 0; }
  .tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #8A8A8A; }
  .a { font-family: var(--font-serif); font-weight: 300; color: #0A0A0A; }
  .b { font-family: var(--font-sans); font-weight: 300; color: #0A0A0A; }
</style>
</head><body>
<div class="l">Letter-spacing as Structure</div>
<div class="row"><div class="tag">0.05em</div><div class="b" style="font-size:14px; letter-spacing:0.05em">內文・基準字距 — body baseline tracking</div></div>
<div class="row"><div class="tag">0.15em</div><div class="a" style="font-size:28px; letter-spacing:0.15em">中文標題・呼吸字距</div></div>
<div class="row"><div class="tag">0.25em</div><div class="b" style="font-size:14px; letter-spacing:0.25em; text-transform:uppercase">ALL CAPS LATIN</div></div>
<div class="row"><div class="tag">0.30em</div><div class="b" style="font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color:#B8924A">TAIWAN BRAND HATCHERY</div></div>
</body></html>
