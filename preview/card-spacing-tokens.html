<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 14px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #0A0A0A; width: 100%; }
  .tag { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: #B8924A; }
  .val { font-size: 9px; letter-spacing: 0.2em; color: #8A8A8A; text-transform: uppercase; }
</style>
</head><body>
<div class="l">Spacing — 8pt baseline grid</div>
<div class="row">
  <div class="step" style="width:24px"><div class="bar" style="height:8px"></div><div class="tag">2</div><div class="val">8</div></div>
  <div class="step" style="width:32px"><div class="bar" style="height:16px"></div><div class="tag">3</div><div class="val">16</div></div>
  <div class="step" style="width:40px"><div class="bar" style="height:24px"></div><div class="tag">4</div><div class="val">24</div></div>
  <div class="step" style="width:56px"><div class="bar" style="height:32px"></div><div class="tag">5</div><div class="val">32</div></div>
  <div class="step" style="width:80px"><div class="bar" style="height:48px"></div><div class="tag">6</div><div class="val">48</div></div>
  <div class="step" style="width:120px"><div class="bar" style="height:64px"></div><div class="tag">7</div><div class="val">64</div></div>
  <div class="step" style="width:180px"><div class="bar" style="height:96px"></div><div class="tag">8</div><div class="val">96</div></div>
</div>
</body></html>
