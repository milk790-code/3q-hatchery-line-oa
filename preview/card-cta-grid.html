<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #0A0A0A; color: #F5F2EC; font-family: var(--font-sans); }
  .l { padding: 18px 24px 0; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1px; background: #B8924A; margin: 16px 0 0; }
  .cell { background: #0A0A0A; padding: 28px 12px 22px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cell img { width: 40px; height: 40px; }
  .zh { font-family: "Noto Serif TC", serif; font-weight: 300; font-size: 15px; letter-spacing: 0.18em; }
  .en { font-size: 8px; letter-spacing: 0.3em; color: #B8924A; text-align: center; }
</style>
</head><body>
<div class="l">Rich Menu 4-Grid · invitations, not categories</div>
<div class="grid">
  <div class="cell"><img src="../assets/icons/consultation.svg"><div class="zh">說說你的店</div><div class="en">TELL US YOUR SHOP</div></div>
  <div class="cell"><img src="../assets/icons/camera.svg"><div class="zh">好物・好照</div><div class="en">WORTHY IMAGES</div></div>
  <div class="cell"><img src="../assets/icons/compass.svg"><div class="zh">陪你被看見</div><div class="en">SEEN, TOGETHER</div></div>
  <div class="cell"><img src="../assets/icons/clock.svg"><div class="zh">走到哪了</div><div class="en">WHERE WE ARE</div></div>
</div>
</body></html>
