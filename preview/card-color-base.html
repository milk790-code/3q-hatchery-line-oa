<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #FAF8F2; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sw { aspect-ratio: 1.2 / 1; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(10,10,10,0.06); }
  .sw .nm { font-family: var(--font-serif); font-weight: 300; font-size: 22px; letter-spacing: 0.1em; }
  .sw .en { font-family: var(--font-sans); font-weight: 300; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.7; margin-top: 2px; }
  .sw .hex { font-family: var(--font-sans); font-weight: 300; font-size: 11px; letter-spacing: 0.2em; }
  .dark { color: #F5F2EC; }
</style>
</head><body>
<div class="row">
  <div class="sw dark" style="background:#0A0A0A">
    <div><div class="nm">孵化墨</div><div class="en">Hatchery Ink</div></div>
    <div class="hex">#0A0A0A</div>
  </div>
  <div class="sw" style="background:#F5F2EC">
    <div><div class="nm">米紙白</div><div class="en">Rice Paper</div></div>
    <div class="hex">#F5F2EC</div>
  </div>
  <div class="sw" style="background:#FFFFFF">
    <div><div class="nm">純白</div><div class="en">Pure White</div></div>
    <div class="hex">#FFFFFF</div>
  </div>
</div>
</body></html>
