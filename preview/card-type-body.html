<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: #F5F2EC; }
  .stack > * + * { margin-top: 12px; }
  .l { font-family: var(--font-sans); font-weight: 300; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; }
  .lead { font-family: var(--font-sans); font-weight: 300; font-size: 18px; line-height: 1.75; letter-spacing: 0.04em; color: #1A1A1A; max-width: 560px; }
  .body { font-family: var(--font-sans); font-weight: 400; font-size: 14px; line-height: 1.75; color: #1A1A1A; max-width: 560px; }
  .cap { font-family: var(--font-sans); font-weight: 300; font-size: 11px; line-height: 1.6; color: #8A8A8A; letter-spacing: 0.15em; }
</style>
</head><body>
<div class="stack">
  <div class="l">Body · Reading</div>
  <div class="lead">只要你願意說，<br/>我們就幫你被看見。</div>
  <div class="body">不管你的需求、想法、產品 — 多大、多小、多複雜，我們都有適合的平台、舞台、後台。<br/>來，幫你圓夢。</div>
  <div class="cap">註腳・3Q 孵化所手記 — TAIPEI · 2026</div>
</div>
</body></html>
