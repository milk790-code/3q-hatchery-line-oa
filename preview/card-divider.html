<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 24px; }
  .stack { display: grid; gap: 30px; }
  .group { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 20px; }
  .tag { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #8A8A8A; }
  hr { border: 0; }
  .hl-40 { width: 40px; height: 1px; background: #B8924A; }
  .hl-80 { width: 80px; height: 1px; background: #B8924A; }
  .hl-full { width: 100%; height: 1px; background: #B8924A; }
  .rule { width: 100%; height: 1px; background: rgba(10,10,10,0.12); }
</style>
</head><body>
<div class="l">Dividers</div>
<div class="stack">
  <div class="group"><div class="tag">40 · canonical</div><hr class="hl-40"></div>
  <div class="group"><div class="tag">80 · wide</div><hr class="hl-80"></div>
  <div class="group"><div class="tag">full · gold</div><hr class="hl-full"></div>
  <div class="group"><div class="tag">full · ink rule</div><hr class="rule"></div>
</div>
</body></html>
