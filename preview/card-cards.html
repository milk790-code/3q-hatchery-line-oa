<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .card { padding: 28px 24px; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; }
  .c1 { background: #FFFFFF; border-top: 1px solid #B8924A; }
  .c2 { background: #E8DFD0; }
  .c3 { background: #0A0A0A; color: #F5F2EC; }
  .c3 .meta { color: #B8924A; }
  .eyebrow { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; }
  .title { font-family: var(--font-serif); font-weight: 300; font-size: 22px; letter-spacing: 0.1em; line-height: 1.3; }
  .meta { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #8A8A8A; }
</style>
</head><body>
<div class="l">Cards — three weights</div>
<div class="grid">
  <div class="card c1">
    <div class="eyebrow">本月入駐</div>
    <div class="title">阿婆雜貨店</div>
    <div class="meta">No. 01 · 雲林</div>
  </div>
  <div class="card c2">
    <div class="eyebrow">服務</div>
    <div class="title">好物・好照</div>
    <div class="meta">WORTHY IMAGES · FROM 500</div>
  </div>
  <div class="card c3">
    <div class="eyebrow">本月主題</div>
    <div class="title">被照亮，被托住</div>
    <div class="meta">ILLUMINATED · HELD</div>
  </div>
</div>
</body></html>
