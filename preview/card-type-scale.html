<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>

  .tag { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #8A8A8A; }
  .num { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: #B8924A; }
  .s { font-family: var(--font-serif); font-weight: 300; color: #0A0A0A; }
</style>
</head><body>
<div class="l">Type Scale</div>
<div class="row"><div class="tag">Hero</div><div class="num">96 / 1.05</div><div class="s" style="font-size:56px">Aa 孵化所</div></div>
<div class="row"><div class="tag">H1</div><div class="num">56 / 1.2</div><div class="s" style="font-size:36px">Aa 孵化所</div></div>
<div class="row"><div class="tag">H2</div><div class="num">38 / 1.3</div><div class="s" style="font-size:26px">Aa 孵化所</div></div>
<div class="row"><div class="tag">H3</div><div class="num">28 / 1.4</div><div class="s" style="font-size:20px">Aa 孵化所</div></div>
<div class="row"><div class="tag">Body</div><div class="num">16 / 1.75</div><div class="s" style="font-family:var(--font-sans); font-size:14px; font-weight:400">Aa 孵化所</div></div>
<div class="row"><div class="tag">Caption</div><div class="num">12 / 1.4</div><div class="s" style="font-family:var(--font-sans); font-size:11px; font-weight:300; letter-spacing:0.25em; text-transform:uppercase; color:#8A8A8A">AA HATCHERY</div></div>
</body></html>
