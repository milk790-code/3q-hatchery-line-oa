<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #F5F2EC; font-family: var(--font-sans); }
  .l { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-bottom: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 14px; padding: 16px 28px; font-family: var(--font-sans); font-weight: 300; font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; border: 0; transition: opacity .2s; }
  .btn:hover { opacity: 0.7; }
  .btn-primary { background: #0A0A0A; color: #F5F2EC; }
  .btn-paper { background: #F5F2EC; color: #0A0A0A; border: 1px solid #0A0A0A; }
  .btn-ghost { background: transparent; color: #0A0A0A; padding: 16px 0; }
  .btn-ghost .ln { width: 24px; height: 1px; background: #B8924A; transition: width .3s; }
  .btn-ghost:hover .ln { width: 48px; }
  .lbl { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #8A8A8A; margin-top: 16px; }
</style>
</head><body>
<div class="l">Buttons · CTAs</div>
<div class="row">
  <button class="btn btn-primary">預約諮詢</button>
  <button class="btn btn-paper">了解更多</button>
  <button class="btn btn-ghost">繼續閱讀 <span class="ln"></span></button>
</div>
<div class="lbl">Hover · opacity 0.7 · or hairline extends to 48px</div>
</body></html>
