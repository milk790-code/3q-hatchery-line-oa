name = "3q-hatchery-webhook"
main = "worker.js"
compatibility_date = "2024-12-01"

# Secrets (via wrangler secret put):
#   LINE_CHANNEL_ACCESS_TOKEN
#   LINE_CHANNEL_SECRET
#   OWNER_USER_ID   (optional — your LINE userId for new-inquiry push alerts)
#   TRIGGER_TOKEN   (bearer token for /api/csv export — set on live, preserved across deploy)

[vars]
PNG_BASE_URL = "https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports"
RICHMENU_NEW = "richmenu-83abd6d0a534f420bef8056a39f1aed7"
RICHMENU_INQUIRED = "richmenu-fbb50a858b2528a1b515ea14defeef9c"
RICHMENU_CONVERTED = "richmenu-c44ccaefca2b85d1a590c584fe942828"

# Workers AI — 超級業務 AI 客服 fallback（沒命中關鍵字時用）
[ai]
binding = "AI"

# KV namespace for guided-flow session state (2h TTL per user)
[[kv_namespaces]]
binding = "SESSION"
id = "20a68b10afc84764ba770b64f0f33f30"

# D1 database for inquiries CRM persistence
[[d1_databases]]
binding = "CRM"
database_name = "3q-hatchery-crm"
database_id = "e54671b1-d15e-4552-babf-cef367267568"

[triggers]
crons = [
  "5 * * * *",
  "0 13 * * 1",
  "0 1 1 3,6,9,12 *"
]
