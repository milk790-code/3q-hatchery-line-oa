name = "3q-hatchery-webhook"
main = "worker.js"
compatibility_date = "2024-12-01"

# Secrets (via wrangler secret put):
#   LINE_CHANNEL_ACCESS_TOKEN
#   LINE_CHANNEL_SECRET
#   OWNER_USER_ID   (optional — your LINE userId for new-inquiry push alerts)

[vars]
PNG_BASE_URL = "https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports"
# v3.7 referral: OA basic id (@…) for prefilled-message deep links + site base for share links
LINE_BASIC_ID = "@121Ikspe"
SITE_BASE_URL = "https://milk790-code.github.io/3q-hatchery-line-oa/"
RICHMENU_NEW = "richmenu-c32900aebf831cc653ec1d7b4788b389"
RICHMENU_INQUIRED = "richmenu-f3d737b3dc01aa12be33aa318670f162"
RICHMENU_CONVERTED = "richmenu-385546ae9b36ded170e18b0f895970e9"

# Cron triggers (declarative — keep ALL; deploy replaces the dashboard set)
#   5 * * * *           follow-ups (hourly)
#   0 13 * * 1          weekly digest (Mon 21:00 TW)
#   0 1 1 3,6,9,12 *    seasonal push (quarterly 09:00 TW)
#   0 12 * * *          v3.7 daily lottery draw (20:00 TW)
[triggers]
crons = ["5 * * * *", "0 13 * * 1", "0 1 1 3,6,9,12 *", "0 12 * * *"]

# KV namespace for guided-flow session state (2h TTL per user)
[[kv_namespaces]]
binding = "SESSION"
id = "20a68b10afc84764ba770b64f0f33f30"

# D1 database for inquiries CRM persistence
[[d1_databases]]
binding = "CRM"
database_name = "3q-hatchery-crm"
database_id = "e54671b1-d15e-4552-babf-cef367267568"

[ai]
binding = "AI"
