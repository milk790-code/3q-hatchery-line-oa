name = "3q-hatchery-webhook"
main = "worker.js"
compatibility_date = "2024-12-01"

# Secrets (via wrangler secret put):
#   LINE_CHANNEL_ACCESS_TOKEN
#   LINE_CHANNEL_SECRET
#   OWNER_USER_ID   (optional — your LINE userId for new-inquiry push alerts)

[vars]
PNG_BASE_URL = "https://milk790-code.github.io/3q-hatchery-line-oa/assets/exports"

# KV namespace for guided-flow session state (2h TTL per user)
[[kv_namespaces]]
binding = "SESSION"
id = "20a68b10afc84764ba770b64f0f33f30"

# D1 database for inquiries CRM persistence
[[d1_databases]]
binding = "CRM"
database_name = "3q-hatchery-crm"
database_id = "e54671b1-d15e-4552-babf-cef367267568"
