<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>3Q · TikTok 封面系列</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;font-family:"Noto Sans TC",sans-serif;padding:36px}
.head{margin-bottom:28px;display:flex;align-items:baseline;justify-content:space-between}
.head h1{color:#F5F2EC;font-size:15px;font-weight:300;letter-spacing:.15em}
.head p{font-size:11px;color:#555;letter-spacing:.05em;margin-top:4px}
.exp-all{background:none;border:0.5px solid rgba(184,146,74,0.5);color:#B8924A;font-size:10px;letter-spacing:.15em;padding:5px 14px;cursor:pointer;font-family:inherit}
.grid{display:flex;gap:20px;flex-wrap:wrap}
.cw{display:flex;flex-direction:column;gap:8px}
.cl{display:flex;justify-content:space-between;align-items:center}
.cn{font-size:9.5px;color:#B8924A;letter-spacing:.15em}
.dl{background:none;border:0.5px solid rgba(184,146,74,0.3);color:#B8924A;font-size:9px;letter-spacing:.1em;padding:2px 8px;cursor:pointer;border-radius:2px;font-family:inherit}
.st{font-size:9px;color:#555;height:13px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NW = 1080, NH = 1920, SC = 0.18;
const W = NW * SC, H = NH * SC;  // ~194 × 346
const s = n => n * SC;
const RF = '"Noto Serif TC", serif';
const RS = '"Noto Sans TC", sans-serif';
const BK = '#0C0A08', PA = '#F5F2EC', GO = '#B8924A';

function TikTokCover({ ep, title, sub, tag, icon }) {
  return (
    <div style={{ width:W, height:H, background:BK, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center' }}>
      {/* Warm glow top */}
      <div style={{ position:'absolute', top:'-15%', right:'-20%', width:'80%', height:'50%', background:'radial-gradient(circle,rgba(184,146,74,0.09),transparent)', pointerEvents:'none' }}/>
      {/* Warm glow bottom */}
      <div style={{ position:'absolute', bottom:'-10%', left:'-15%', width:'70%', height:'40%', background:'radial-gradient(circle,rgba(184,146,74,0.05),transparent)', pointerEvents:'none' }}/>

      {/* Top bar */}
      <div style={{ width:'100%', padding:`${s(60)}px ${s(56)}px`, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:RS, fontSize:s(20), fontWeight:300, letterSpacing:'.4em', textTransform:'uppercase', color:'rgba(184,146,74,0.6)' }}>3Q · BRAND HATCHERY</div>
          <div style={{ fontFamily:RS, fontSize:s(16), fontWeight:300, letterSpacing:'.3em', textTransform:'uppercase', color:'rgba(245,242,236,0.25)', marginTop:s(8) }}>TIKTOK SERIES</div>
        </div>
        <div style={{ fontFamily:RF, fontStyle:'italic', fontSize:s(22), color:'rgba(184,146,74,0.5)', letterSpacing:'.1em' }}>{ep}</div>
      </div>

      {/* Center icon area */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:s(32) }}>
        {icon}
        <div style={{ width:s(40), height:.5, background:GO }}/>
      </div>

      {/* Bottom content — above the safe zone */}
      <div style={{ width:'100%', padding:`${s(48)}px ${s(56)}px ${s(320)}px`, textAlign:'center' }}>
        {/* Tag */}
        {tag && <div style={{ fontFamily:RS, fontSize:s(18), fontWeight:300, letterSpacing:'.35em', textTransform:'uppercase', color:GO, marginBottom:s(28) }}>{tag}</div>}
        {/* Title */}
        <div style={{ fontFamily:RF, fontWeight:300, fontSize:s(72), letterSpacing:'.08em', color:PA, lineHeight:1.3, marginBottom:s(20) }}>{title}</div>
        {/* Sub */}
        <div style={{ fontFamily:RF, fontWeight:300, fontStyle:'italic', fontSize:s(28), letterSpacing:'.08em', color:'rgba(245,242,236,0.5)', lineHeight:1.6 }}>{sub}</div>
      </div>

      {/* TikTok bottom safe zone indicator */}
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:s(280), background:'linear-gradient(to top, rgba(12,10,8,0.95), rgba(12,10,8,0))', pointerEvents:'none' }}/>
      <div style={{ position:'absolute', bottom:s(40), left:s(56), fontFamily:RS, fontSize:s(16), fontWeight:300, letterSpacing:'.25em', color:'rgba(184,146,74,0.4)', textTransform:'uppercase' }}>lin.ee/UKKodJj</div>
    </div>
  );
}

const TreeIcon = () => (
  <svg width={s(140)} height={s(140)} viewBox="0 0 280 280" fill="none" stroke={GO} strokeWidth="1.2" strokeLinecap="round">
    <line x1="140" y1="60" x2="140" y2="240"/>
    <path d="M140 80 Q120 90 110 110 Q120 105 140 100"/><path d="M140 80 Q160 90 170 110 Q160 105 140 100"/>
    <path d="M140 110 Q110 120 95 145 Q115 138 140 130"/><path d="M140 110 Q170 120 185 145 Q165 138 140 130"/>
    <path d="M140 140 Q100 152 80 180 Q110 170 140 162"/><path d="M140 140 Q180 152 200 180 Q170 170 140 162"/>
    <circle cx="140" cy="48" r="3" fill={GO} stroke="none"/>
    <circle cx="140" cy="48" r="12" strokeOpacity="0.3"/>
    <circle cx="140" cy="48" r="22" strokeOpacity="0.15"/>
  </svg>
);
const GridIcon = () => (
  <svg width={s(100)} height={s(100)} viewBox="0 0 80 80" fill="none" stroke={GO} strokeWidth="1.5" strokeLinecap="round">
    <rect x="10" y="10" width="25" height="25"/><rect x="45" y="10" width="25" height="25"/>
    <rect x="10" y="45" width="25" height="25"/><rect x="45" y="45" width="25" height="25"/>
  </svg>
);
const StarIcon = () => (
  <svg width={s(100)} height={s(100)} viewBox="0 0 80 80" fill="none" stroke={GO} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M40 10 L47 30 L68 30 L52 43 L58 63 L40 51 L22 63 L28 43 L12 30 L33 30Z"/>
  </svg>
);
const ChatIcon = () => (
  <svg width={s(100)} height={s(100)} viewBox="0 0 80 80" fill="none" stroke={GO} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M14 20h44a4 4 0 014 4v22a4 4 0 01-4 4H32l-12 10V50h-6a4 4 0 01-4-4V24a4 4 0 014-4z"/>
    <line x1="22" y1="32" x2="58" y2="32"/><line x1="22" y1="40" x2="46" y2="40"/>
  </svg>
);

const covers = [
  { id:'t01', label:'EP.01 品牌開帳', comp: <TikTokCover ep="EP. 01" tag="LAUNCH · 開帳了" title={"只要你\n願意說"} sub="我們就幫你被看見" icon={<TreeIcon/>}/> },
  { id:'t02', label:'EP.02 服務一覽', comp: <TikTokCover ep="EP. 02" tag="SERVICES · 服務一覽" title={"六種方式\n幫你被看見"} sub="品牌 · 官網 · App · 影音 · 外送 · 美編" icon={<GridIcon/>}/> },
  { id:'t03', label:'EP.03 合作案例', comp: <TikTokCover ep="EP. 03" tag="PORTFOLIO · 案例" title={"他們的\n故事"} sub="入駐品牌 × 3Q貢丸" icon={<StarIcon/>}/> },
  { id:'t04', label:'EP.04 諮詢招募', comp: <TikTokCover ep="EP. 04" tag="OPEN · 諮詢開放" title={"下一個\n是你嗎"} sub="免費 30 分鐘，從這裡開始" icon={<ChatIcon/>}/> },
];

async function dlCover(id, label, setStatus) {
  if (!window.htmlToImage) return;
  setStatus('匯出中...');
  try {
    await document.fonts.ready;
    const el = document.getElementById(id);
    const url = await htmlToImage.toPng(el, { pixelRatio: Math.ceil(NW / W), backgroundColor: BK });
    const a = document.createElement('a'); a.download = `3Q-TikTok-${label}.png`; a.href = url; a.click();
    setStatus('✓ 已下載'); setTimeout(() => setStatus(''), 2500);
  } catch(e) { setStatus('失敗'); }
}

function App() {
  const [sts, setSts] = React.useState({});
  const set = (id, v) => setSts(s => ({...s, [id]: v}));
  async function expAll() {
    for (const {id, label} of covers) { await dlCover(id, label, v => set(id, v)); await new Promise(r => setTimeout(r, 500)); }
  }
  return (
    <div>
      <div className="head">
        <div>
          <h1>3Q貢丸 · TikTok 封面系列</h1>
          <p>4 張 · 1080×1920 · 9:16 · 底部為 TikTok 安全區（UI 覆蓋區）</p>
        </div>
        <button className="exp-all" onClick={expAll}>匯出全部 PNG</button>
      </div>
      <div className="grid">
        {covers.map(({id, label, comp}) => (
          <div key={id} className="cw">
            <div id={id}>{comp}</div>
            <div className="cl">
              <span className="cn">{label}</span>
              <button className="dl" onClick={() => dlCover(id, label, v => set(id, v))}>↓ PNG</button>
            </div>
            <div className="st">{sts[id] || ''}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
