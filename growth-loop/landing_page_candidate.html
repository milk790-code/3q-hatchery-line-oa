<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3Q 48h 成交診斷</title>
  <style>
    :root {
      --ink: #1d2528;
      --paper: #f7f3ea;
      --signal: #00a676;
      --clay: #b85c38;
      --line: #d8c7a3;
      --panel: #fffaf0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    main {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: clamp(24px, 6vw, 72px);
    }
    .sheet {
      width: min(100%, 1040px);
      max-width: 1040px;
      margin: 0 auto;
      border-top: 3px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: clamp(28px, 5vw, 64px) 0;
    }
    .label {
      width: fit-content;
      padding: 6px 10px;
      background: var(--signal);
      color: white;
      font-size: 13px;
      font-weight: 800;
    }
    h1 {
      max-width: 900px;
      margin: 22px 0 18px;
      font-size: 72px;
      line-height: 1.02;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: clamp(24px, 5vw, 72px);
      align-items: end;
    }
    p {
      max-width: 640px;
      font-size: 20px;
      line-height: 1.55;
    }
    .proof {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px;
    }
    .proof strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      color: var(--clay);
    }
    .cta {
      display: inline-flex;
      min-height: 52px;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      padding: 0 22px;
      background: var(--ink);
      color: white;
      font-weight: 850;
      text-decoration: none;
    }
    .small {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.45;
      color: #5c686c;
    }
    @media (max-width: 1100px) {
      h1 { font-size: 56px; }
    }
    @media (max-width: 760px) {
      main {
        align-items: start;
        padding: 28px 20px;
      }
      .sheet { padding: 28px 0; }
      .grid { grid-template-columns: 1fr; }
      h1 {
        margin-top: 18px;
        font-size: 42px;
        line-height: 1.08;
      }
      p { font-size: 18px; }
      .cta {
        width: 100%;
        padding: 12px 18px;
        text-align: center;
      }
      .proof strong { font-size: 28px; }
    }
    @media (max-width: 420px) {
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="sheet">
      <div class="label">3Q Growth Loop / Candidate</div>
      <h1>48 小時內，把你的頁面改成會有人加 LINE 的版本。</h1>
      <div class="grid">
        <div>
          <p>丟一個現有頁面或貼文，我先抓出流量漏在哪：hook、offer、視覺主張或 CTA。這輪只測 CTA，不動主連結、不承諾成交、不碰客戶資料。</p>
          <a class="cta" href="https://lin.ee/VZvs7sj" data-asset-id="challenger-week0-cta-text-v1">加 LINE 領 48h 成交診斷</a>
          <div class="small">送出前由學誼人工確認；本頁是候選頁，不是正式主頁。</div>
        </div>
        <aside class="proof">
          <strong>1 變因</strong>
          本輪只改 CTA text。樣本不足時保留冠軍頁，挑戰頁不會自動扶正。
        </aside>
      </div>
    </section>
  </main>
  <script>
    const assetId = "challenger-week0-cta-text-v1";
    navigator.sendBeacon?.("/e", JSON.stringify({ asset_id: assetId, event_type: "page_view", metadata_json: { surface: "candidate_static" } }));
    document.querySelector(".cta")?.addEventListener("click", () => {
      navigator.sendBeacon?.("/e", JSON.stringify({ asset_id: assetId, event_type: "cta_click", metadata_json: { surface: "candidate_static" } }));
    });
  </script>
</body>
</html>
