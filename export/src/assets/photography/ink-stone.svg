  <ellipse cx="540" cy="780" rx="320" ry="32" fill="#0A0908" opacity="0.30"></ellipse>

  
  <rect x="240" y="380" width="600" height="380" rx="18" fill="url(#stone)"></rect>
  
  <ellipse cx="540" cy="560" rx="180" ry="80" fill="url(#ink)"></ellipse>
  
  <ellipse cx="500" cy="540" rx="40" ry="6" fill="#FFFFFF" opacity="0.06"></ellipse>

  <rect width="1080" height="1080" filter="url(#grain5)" opacity="0.55"></rect>
