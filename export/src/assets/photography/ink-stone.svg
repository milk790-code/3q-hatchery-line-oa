
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg5" cx="30%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#EFEAE0"></stop>
      <stop offset="100%" stop-color="#B8B0A0"></stop>
    </radialGradient>
    <radialGradient id="stone" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3A3530"></stop>
      <stop offset="60%" stop-color="#1A1612"></stop>
      <stop offset="100%" stop-color="#0A0908"></stop>
    </radialGradient>
    <radialGradient id="ink" cx="55%" cy="40%" r="60%">
