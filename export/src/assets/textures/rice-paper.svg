
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <filter id="paper" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0.18 0"></feColorMatrix>
    </filter>
    <radialGradient id="vignette" cx="35%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#F5F2EC" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#D8D2C5" stop-opacity="1"></stop>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#vignette)"></rect>
  <rect width="800" height="800" filter="url(#paper)"></rect>
</svg>