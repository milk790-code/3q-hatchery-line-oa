<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Rich Menu C v2 · RICHMENU_CONVERTED</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0C0A08;font-family:"Noto Sans TC",sans-serif;color:#F5F2EC;width:2500px;height:1686px;overflow:hidden}
.rm{width:2500px;height:1686px;background:#0C0A08;position:relative;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
.rm::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 10% 90%,rgba(184,146,74,0.04),transparent 55%);pointer-events:none;z-index:0}
.cell{position:relative;display:flex;flex-direction:column;z-index:1}
.hero{grid-column:1/3;padding:96px 88px;justify-content:space-between;border-right:1px solid rgba(184,146,74,0.12);border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-02{padding:72px 64px;border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-03{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-04{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-05{padding:72px 64px}
.eyebrow{font-size:20px;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:#B8924A}
.hairline{width:140px;height:1px;background:linear-gradient(90deg,#B8924A,rgba(184,146,74,0.2));margin:44px 0 48px}
.hero h1{font-family:"Noto Serif TC",serif;font-weight:300;font-size:92px;line-height:1.4;letter-spacing:.08em}
.hero .sub{font-size:24px;line-height:1.85;letter-spacing:.05em;color:rgba(245,242,236,0.50);margin-top:36px;max-width:1200px}
.ic{width:76px;height:76px;margin-bottom:auto;opacity:0.85}
.cell .title{font-family:"Noto Serif TC",serif;font-weight:300;font-size:38px;letter-spacing:.15em;line-height:1.45;margin-top:28px}
.cell .en{font-size:17px;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:rgba(184,146,74,0.40);margin-top:12px}
.brand{position:absolute;bottom:52px;right:60px;font-weight:300;font-size:24px;letter-spacing:.32em;color:rgba(245,242,236,0.15);z-index:2}


.c-seal{display:inline-flex;align-items:center;gap:18px;font-size:18px;letter-spacing:.5em;text-transform:uppercase;color:#B8924A;padding:14px 24px;border:1px solid rgba(184,146,74,0.45);align-self:flex-start;font-weight:300}
.c-seal::before{content:"";width:12px;height:12px;border:1px solid #B8924A;transform:rotate(45deg);flex-shrink:0}
.c-id{margin-top:auto;padding-top:44px;display:flex;flex-direction:column;gap:8px}
.c-id .l{font-size:16px;letter-spacing:.40em;text-transform:uppercase;color:rgba(184,146,74,0.45);font-weight:300}
.c-id .v{font-family:"Noto Serif TC",serif;font-weight:300;font-style:italic;font-size:34px;letter-spacing:.18em}
.rm::after{content:"";position:absolute;inset:28px;border:1px solid rgba(184,146,74,0.30);pointer-events:none;z-index:0}

</style>
</head>
<body>
<div class="rm">
  <div class="cell hero">
    <div>
      <div class="c-seal">MEMBER · 會員</div>
      <div class="hairline"></div>
      <h1>你的專案，<br/>正在被照顧。</h1>
      <p class="sub">每一個合作的店家，都是我們的人。<br/>隨時打字進來，我們都在。</p>
    </div>
    <div class="c-id">
      <div class="l">YOUR ADVISOR</div>
      <div class="v">— 隨時為你 —</div>
    </div></div>
  <div class="cell cell-02"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="18" width="52" height="44"/><line x1="14" y1="30" x2="66" y2="30"/><line x1="22" y1="42" x2="36" y2="42"/><line x1="22" y1="50" x2="44" y2="50"/></svg>
    <div class="title">我的專案<br/>狀態</div>
    <div class="en">MY PROJECT</div></div>
  <div class="cell cell-03"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="40" cy="40" r="22"/><line x1="40" y1="28" x2="40" y2="52"/><line x1="28" y1="40" x2="52" y2="40"/></svg>
    <div class="title">追加服務</div>
    <div class="en">ADD-ONS</div></div>
  <div class="cell cell-04"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 22h32v40H22z"/><line x1="22" y1="32" x2="54" y2="32"/><path d="M22 22v-6h32v6"/></svg>
    <div class="title">VIP 資源庫</div>
    <div class="en">VAULT</div></div>
  <div class="cell cell-05"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="28" cy="32" r="8"/><circle cx="52" cy="32" r="8"/><path d="M14 60 C14 50 20 46 28 46 C36 46 42 50 42 60"/><path d="M38 60 C38 50 44 46 52 46 C60 46 66 50 66 60"/></svg>
    <div class="title">介紹新客戶</div>
    <div class="en">REFER</div></div>
  <span class="brand">3Q · MEMBER</span>
</div>
</body>
</html>
