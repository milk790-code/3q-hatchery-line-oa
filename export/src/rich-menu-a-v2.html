<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Rich Menu A v2 · RICHMENU_NEW</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0C0A08;font-family:"Noto Sans TC",sans-serif;color:#F5F2EC;width:2500px;height:1686px;overflow:hidden}
.rm{width:2500px;height:1686px;background:#0C0A08;position:relative;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
.rm::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 10% 90%,rgba(184,146,74,0.04),transparent 55%);pointer-events:none;z-index:0}
.cell{position:relative;display:flex;flex-direction:column;z-index:1}
.hero{grid-column:1/3;padding:96px 88px;justify-content:space-between;border-right:1px solid rgba(184,146,74,0.12);border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-02{padding:72px 64px;border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-03{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-04{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-05{padding:72px 64px}
.eyebrow{font-size:20px;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:#B8924A}
.hairline{width:140px;height:1px;background:linear-gradient(90deg,#B8924A,rgba(184,146,74,0.2));margin:44px 0 48px}
.hero h1{font-family:"Noto Serif TC",serif;font-weight:300;font-size:92px;line-height:1.4;letter-spacing:.08em}
.hero .sub{font-size:24px;line-height:1.85;letter-spacing:.05em;color:rgba(245,242,236,0.50);margin-top:36px;max-width:1200px}
.ic{width:76px;height:76px;margin-bottom:auto;opacity:0.85}
.cell .title{font-family:"Noto Serif TC",serif;font-weight:300;font-size:38px;letter-spacing:.15em;line-height:1.45;margin-top:28px}
.cell .en{font-size:17px;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:rgba(184,146,74,0.40);margin-top:12px}
.brand{position:absolute;bottom:52px;right:60px;font-weight:300;font-size:24px;letter-spacing:.32em;color:rgba(245,242,236,0.15);z-index:2}


.services{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:40px}
.services .tag{font-size:20px;font-weight:300;letter-spacing:.12em;color:rgba(245,242,236,0.42)}
.services .sep{width:5px;height:5px;border-radius:50%;background:rgba(184,146,74,0.28);flex-shrink:0}
.cta-row{display:flex;align-items:center;gap:32px}
.cta-row .label{font-family:"Noto Serif TC",serif;font-weight:300;font-size:30px;letter-spacing:.25em}
.cta-row .arrow{width:96px;height:1px;background:#B8924A;position:relative}
.cta-row .arrow::after{content:"";position:absolute;right:0;top:-7px;width:14px;height:14px;border-right:1.5px solid #B8924A;border-top:1.5px solid #B8924A;transform:rotate(45deg)}

</style>
</head>
<body>
<div class="rm">
  <div class="cell hero">
    <div>
      <div class="eyebrow">3Q BRAND HATCHERY</div>
      <div class="hairline"></div>
      <h1>只要你願意說，<br/>我們就幫你被看見。</h1>
      <div class="services">
        <span class="tag">品牌孵化</span><span class="sep"></span>
        <span class="tag">官網設計</span><span class="sep"></span>
        <span class="tag">App</span><span class="sep"></span>
        <span class="tag">影音剪輯</span><span class="sep"></span>
        <span class="tag">外送美圖</span><span class="sep"></span>
        <span class="tag">後台美編</span>
      </div>
    </div>
    <div class="cta-row">
      <span class="label">說說你的店</span>
      <span class="arrow"></span>
    </div></div>
  <div class="cell cell-02"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 60 C20 35 30 18 40 18 C50 18 60 35 60 60Z"/><line x1="26" y1="50" x2="34" y2="50"/><line x1="46" y1="50" x2="54" y2="50"/></svg>
    <div class="title">品牌孵化<br/>是什麼</div>
    <div class="en">WHAT WE DO</div></div>
  <div class="cell cell-03"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="18" y="18" width="18" height="18"/><rect x="44" y="18" width="18" height="18"/><rect x="18" y="44" width="18" height="18"/><rect x="44" y="44" width="18" height="18"/></svg>
    <div class="title">服務一覽</div>
    <div class="en">SERVICES</div></div>
  <div class="cell cell-04"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M40 18 L49 36 L68 38 L54 51 L58 70 L40 60 L22 70 L26 51 L12 38 L31 36Z"/></svg>
    <div class="title">合作案例</div>
    <div class="en">PORTFOLIO</div></div>
  <div class="cell cell-05"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 22h44a4 4 0 014 4v22a4 4 0 01-4 4H32l-12 10V52h-6a4 4 0 01-4-4V26a4 4 0 014-4z"/><line x1="24" y1="34" x2="56" y2="34"/><line x1="24" y1="42" x2="48" y2="42"/></svg>
    <div class="title">聯絡我們</div>
    <div class="en">CONTACT</div></div>
  <span class="brand">3Q · BRAND HATCHERY</span>
</div>
</body>
</html>
