<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Member Card BG · 1040×585 (rendered 520×293)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; font-family: "Noto Sans TC","Helvetica Neue",Arial,sans-serif; width: 520px; height: 293px; }
  .card { width: 520px; height: 293px; background: #0A0A0A; position: relative;
    padding: 32px 36px; color: #F5F2EC; overflow: hidden; }
  .card::before { content: ""; position: absolute; inset: 10px;
    border: 0.5px solid rgba(184,146,74,0.4); pointer-events: none; }

  .top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 2; }
  .top .member { font-size: 6.5px; letter-spacing: 0.55em; text-transform: uppercase; color: #B8924A; font-weight: 300; }
  .seal { display: inline-flex; align-items: center; gap: 5px;
    font-size: 4.5px; letter-spacing: 0.4em; text-transform: uppercase; color: #B8924A;
    padding: 3px 6px; border: 0.5px solid #B8924A; }
  .seal::before { content: ""; width: 3px; height: 3px; border: 0.5px solid #B8924A; transform: rotate(45deg); }

  .hair { width: 40px; height: 0.5px; background: #B8924A; margin: 14px 0; position: relative; z-index: 2; }

  .logo { position: relative; z-index: 2; }
  .logo .zh { font-family: "Noto Serif TC","Cormorant Garamond","Georgia",serif; font-weight: 300; font-size: 32px; letter-spacing: 0.15em; color: #F5F2EC; line-height: 1; }
  .logo .en { font-size: 5.5px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(245,242,236,0.5); margin-top: 7px; font-weight: 300; }

  .bot { position: absolute; bottom: 32px; left: 36px; right: 36px;
    display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
  .holder-label { font-size: 4.5px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(184,146,74,0.65); margin-bottom: 4px; }
  .holder-ph { font-family: "Noto Serif TC",serif; font-style: italic; font-weight: 300; font-size: 7px; color: rgba(245,242,236,0.3); letter-spacing: 0.1em; }

  .pattern { position: absolute; bottom: 0; right: 0; width: 160px; height: 160px; opacity: 0.2; pointer-events: none; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <span class="member">MEMBER</span>
    <span class="seal">3Q · HATCHERY</span>
  </div>
  <div class="hair"></div>
  <div class="logo">
    <div class="zh">3Q貢丸</div>
    <div class="en">TAIWAN BRAND HATCHERY</div>

  <div class="bot">
    <div>
      <div class="holder-label">MEMBER</div>

    <div style="text-align:right">

      <div class="holder-ph">— ・ —</div>

    <line x1="80" y1="320" x2="320" y2="80"/><line x1="120" y1="320" x2="320" y2="120"/>
    <line x1="160" y1="320" x2="320" y2="160"/><line x1="200" y1="320" x2="320" y2="200"/>
    <line x1="240" y1="320" x2="320" y2="240"/><line x1="280" y1="320" x2="320" y2="280"/>
    <line x1="0" y1="280" x2="40" y2="320"/><line x1="0" y1="240" x2="80" y2="320"/>
    <line x1="0" y1="200" x2="120" y2="320"/><line x1="0" y1="160" x2="160" y2="320"/>
    <line x1="0" y1="120" x2="200" y2="320"/><line x1="0" y1="80" x2="240" y2="320"/>
    <line x1="0" y1="40" x2="280" y2="320"/>

</div>
</body>
</html>
