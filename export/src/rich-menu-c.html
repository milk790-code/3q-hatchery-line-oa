<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Rich Menu C · RICHMENU_CONVERTED</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0A0A0A; font-family: "Noto Sans TC","Helvetica Neue",Arial,sans-serif; color: #F5F2EC; width: 625px; height: 422px; }
  .rm { width: 625px; height: 422px; background: #0A0A0A; position: relative;
        display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }
  .rm::before { content: ""; position: absolute; inset: 8px; border: 0.5px solid rgba(184,146,74,0.45); pointer-events: none; z-index: 1; }

  .cell { position: relative; padding: 18px 16px;
    border-right: 0.5px solid rgba(184,146,74,0.25);
    border-bottom: 0.5px solid rgba(184,146,74,0.25);
    display: flex; flex-direction: column; z-index: 2; }
  .cell:nth-child(3) { border-right: 0; }
  .cell:nth-child(4), .cell:nth-child(5) { border-bottom: 0; }
  .c-hero { grid-column: 1 / 3; grid-row: 1 / 2; padding: 28px 22px; justify-content: space-between;
    border-bottom: 0.5px solid rgba(184,146,74,0.25); }

  .c-hero .seal { display: inline-flex; align-items: center; gap: 6px;
    font-size: 5px; letter-spacing: 0.5em; text-transform: uppercase; color: #B8924A;
    padding: 4px 8px; border: 0.5px solid #B8924A; align-self: flex-start; }
  .c-hero .seal::before { content: ""; width: 4px; height: 4px; border: 0.5px solid #B8924A; transform: rotate(45deg); }

  .hair-lg { width: 40px; height: 0.5px; background: #B8924A; margin: 14px 0 14px; }
  .c-hero h1 { font-family: "Noto Serif TC","Cormorant Garamond","Georgia",serif;
    font-weight: 300; font-size: 24px; line-height: 1.3; letter-spacing: 0.12em; color: #F5F2EC; }
  .c-hero .sub { font-size: 6px; line-height: 1.85; letter-spacing: 0.04em; color: rgba(245,242,236,0.55); margin-top: 10px; max-width: 320px; }

  .c-id { margin-top: auto; padding-top: 14px; display: flex; flex-direction: column; gap: 2px; }
  .c-id .l { font-size: 4.5px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(184,146,74,0.6); }
  .c-id .v { font-family: "Noto Serif TC",serif; font-weight: 300; font-style: italic; font-size: 9px; letter-spacing: 0.18em; color: #F5F2EC; }

  .cell .ic { width: 20px; height: 20px; margin-bottom: auto; }
  .cell .title { font-family: "Noto Serif TC",serif; font-weight: 300; font-size: 9px; letter-spacing: 0.18em; color: #F5F2EC; line-height: 1.4; margin-top: 8px; }
  .cell .en { font-size: 4.5px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-top: 3px; }
  .cell .num { position: absolute; top: 12px; right: 12px; font-family: "Noto Serif TC",serif; font-style: italic; font-size: 6px; color: rgba(184,146,74,0.5); letter-spacing: 0.1em; }

  .brand { position: absolute; bottom: 14px; right: 16px; font-family: "Noto Serif TC",serif; font-weight: 300; font-size: 6.5px; letter-spacing: 0.35em; color: #B8924A; z-index: 5; }
</style>
</head>
<body>
<div class="rm">

  <div class="cell c-hero">
    <div>
      <div class="seal">MEMBER · 會員</div>
      <div class="hair-lg"></div>
      <h1>你的專案，<br/>正在被照顧。</h1>
      <p class="sub">每一個合作的店家，都是我們的人。<br/>隨時打字進來，我們都在。</p>
    </div>
    <div class="c-id">
      <div class="l">YOUR ADVISOR</div>
      <div class="v">— 隨時為你 —</div>
    </div>
  </div>

  <div class="cell">
    <div class="num">02</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="14" y="18" width="52" height="44"/><line x1="14" y1="30" x2="66" y2="30"/>
      <line x1="22" y1="42" x2="36" y2="42"/><line x1="22" y1="50" x2="44" y2="50"/>
    </svg>
    <div class="title">我的專案<br/>狀態</div>
    <div class="en">MY PROJECT</div>
  </div>

  <div class="cell">
    <div class="num">03</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="40" y1="20" x2="40" y2="60"/><line x1="20" y1="40" x2="60" y2="40"/>
      <circle cx="40" cy="40" r="22"/>
    </svg>
    <div class="title">追加服務</div>
    <div class="en">ADD-ONS</div>
  </div>

  <div class="cell">
    <div class="num">04</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 22 h32 v40 h-32 z"/>
      <line x1="22" y1="32" x2="54" y2="32"/>
      <path d="M22 22 v-6 h32 v6"/>
    </svg>
    <div class="title">VIP 資源庫</div>
    <div class="en">VAULT</div>
  </div>

  <div class="cell">
    <div class="num">05</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="28" cy="32" r="8"/><circle cx="52" cy="32" r="8"/>
      <path d="M14 60 C 14 50, 20 46, 28 46 C 36 46, 42 50, 42 60"/>
      <path d="M38 60 C 38 50, 44 46, 52 46 C 60 46, 66 50, 66 60"/>
    </svg>
    <div class="title">介紹新客戶</div>
    <div class="en">REFER</div>
  </div>

  <div class="brand">3Q · MEMBER</div>
</div>
</body>
</html>
