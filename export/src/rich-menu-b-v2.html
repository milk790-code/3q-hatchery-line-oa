<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Rich Menu B v2 · RICHMENU_INQUIRED</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0C0A08;font-family:"Noto Sans TC",sans-serif;color:#F5F2EC;width:2500px;height:1686px;overflow:hidden}
.rm{width:2500px;height:1686px;background:#0C0A08;position:relative;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
.rm::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 10% 90%,rgba(184,146,74,0.04),transparent 55%);pointer-events:none;z-index:0}
.cell{position:relative;display:flex;flex-direction:column;z-index:1}
.hero{grid-column:1/3;padding:96px 88px;justify-content:space-between;border-right:1px solid rgba(184,146,74,0.12);border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-02{padding:72px 64px;border-bottom:1px solid rgba(184,146,74,0.12)}
.cell-03{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-04{padding:72px 64px;border-right:1px solid rgba(184,146,74,0.12)}
.cell-05{padding:72px 64px}
.eyebrow{font-size:20px;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:#B8924A}
.hairline{width:140px;height:1px;background:linear-gradient(90deg,#B8924A,rgba(184,146,74,0.2));margin:44px 0 48px}
.hero h1{font-family:"Noto Serif TC",serif;font-weight:300;font-size:92px;line-height:1.4;letter-spacing:.08em}
.hero .sub{font-size:24px;line-height:1.85;letter-spacing:.05em;color:rgba(245,242,236,0.50);margin-top:36px;max-width:1200px}
.ic{width:76px;height:76px;margin-bottom:auto;opacity:0.85}
.cell .title{font-family:"Noto Serif TC",serif;font-weight:300;font-size:38px;letter-spacing:.15em;line-height:1.45;margin-top:28px}
.cell .en{font-size:17px;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:rgba(184,146,74,0.40);margin-top:12px}
.brand{position:absolute;bottom:52px;right:60px;font-weight:300;font-size:24px;letter-spacing:.32em;color:rgba(245,242,236,0.15);z-index:2}


.b-status{display:flex;align-items:center;gap:24px;padding:22px 32px;border:1px solid rgba(184,146,74,0.35);background:rgba(184,146,74,0.03);align-self:flex-start}
.b-dot{width:14px;height:14px;border-radius:50%;background:#B8924A;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(1.5)}}
.b-text{font-size:18px;letter-spacing:.35em;text-transform:uppercase;color:#B8924A;font-weight:300}
.rm::before{background:radial-gradient(ellipse at 8% 92%,rgba(184,146,74,0.06),transparent 50%)}

</style>
</head>
<body>
<div class="rm">
  <div class="cell hero">
    <div>
      <div class="eyebrow">IN PROGRESS · 進行中</div>
      <div class="hairline"></div>
      <h1>預約諮詢，<br/>下一步一起想。</h1>
      <p class="sub">你說的我們聽到了。挑出三個時段，你選一個方便的。</p>
    </div>
    <div class="b-status">
      <span class="b-dot"></span>
      <span class="b-text">CONSULTATION · OPEN</span>
    </div></div>
  <div class="cell cell-02"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="20" width="52" height="46" rx="2"/><line x1="14" y1="32" x2="66" y2="32"/><line x1="24" y1="14" x2="24" y2="24"/><line x1="56" y1="14" x2="56" y2="24"/></svg>
    <div class="title">追蹤進度</div>
    <div class="en">PROJECT STATUS</div></div>
  <div class="cell cell-03"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="16" y="14" width="42" height="52"/><line x1="24" y1="26" x2="50" y2="26"/><line x1="24" y1="36" x2="42" y2="36"/><line x1="24" y1="46" x2="50" y2="46"/><line x1="24" y1="56" x2="38" y2="56"/></svg>
    <div class="title">看看報價</div>
    <div class="en">ESTIMATE</div></div>
  <div class="cell cell-04"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="40" cy="40" r="22"/><path d="M40 28v12l10 6"/></svg>
    <div class="title">優化建議</div>
    <div class="en">SUGGESTIONS</div></div>
  <div class="cell cell-05"><svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="40" cy="32" r="10"/><path d="M20 64 C20 52 28 46 40 46 C52 46 60 52 60 64"/></svg>
    <div class="title">聯絡顧問</div>
    <div class="en">YOUR ADVISOR</div></div>
  <span class="brand">3Q · IN PROGRESS</span>
</div>
</body>
</html>
