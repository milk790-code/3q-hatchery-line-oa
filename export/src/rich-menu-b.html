<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>Rich Menu B · RICHMENU_INQUIRED</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0A0A0A; font-family: "Noto Sans TC","Helvetica Neue",Arial,sans-serif; color: #F5F2EC; width: 625px; height: 422px; }
  .rm { width: 625px; height: 422px; background: #0A0A0A; position: relative;
        display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }
  .cell { position: relative; padding: 18px 16px;
    border-right: 0.5px solid rgba(184,146,74,0.22);
    border-bottom: 0.5px solid rgba(184,146,74,0.22);
    display: flex; flex-direction: column; }
  .cell:nth-child(3) { border-right: 0; }
  .cell:nth-child(4), .cell:nth-child(5) { border-bottom: 0; }
  .b-hero { grid-column: 1 / 3; grid-row: 1 / 2; padding: 24px 22px; justify-content: space-between;
    background: radial-gradient(circle at 0% 100%, rgba(184,146,74,0.07), rgba(184,146,74,0)); }

  .eyebrow { font-size: 5px; letter-spacing: 0.35em; text-transform: uppercase; color: #B8924A; font-weight: 300; }
  .hair-lg { width: 40px; height: 0.5px; background: #B8924A; margin: 12px 0 14px; }
  .b-hero h1 { font-family: "Noto Serif TC","Cormorant Garamond","Georgia",serif;
    font-weight: 300; font-size: 24px; line-height: 1.3; letter-spacing: 0.1em; color: #F5F2EC; }
  .b-hero .sub { font-size: 6px; line-height: 1.85; letter-spacing: 0.04em; color: rgba(245,242,236,0.6); margin-top: 10px; max-width: 320px; }

  .b-status { display: flex; align-items: center; gap: 7px; margin-top: auto;
    padding: 7px 9px; border: 0.5px solid rgba(184,146,74,0.5); background: rgba(184,146,74,0.04);
    align-self: flex-start; }
  .b-status .dot { width: 4px; height: 4px; border-radius: 50%; background: #B8924A; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.5); } }
  .b-status .text { font-size: 5px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; }

  .cell .ic { width: 20px; height: 20px; margin-bottom: auto; }
  .cell .title { font-family: "Noto Serif TC",serif; font-weight: 300; font-size: 9px; letter-spacing: 0.18em; color: #F5F2EC; line-height: 1.4; margin-top: 8px; }
  .cell .en { font-size: 4.5px; letter-spacing: 0.3em; text-transform: uppercase; color: #B8924A; margin-top: 3px; }
  .cell .num { position: absolute; top: 12px; right: 12px; font-family: "Noto Serif TC",serif; font-style: italic; font-size: 6px; color: rgba(184,146,74,0.5); letter-spacing: 0.1em; }

  .corner { position: absolute; width: 12px; height: 12px; border: 0.5px solid #B8924A; opacity: 0.5; pointer-events: none; }
  .corner.tl { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
  .corner.br { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }

  .brand { position: absolute; bottom: 14px; right: 14px; font-family: "Noto Serif TC",serif; font-weight: 300; font-size: 6.5px; letter-spacing: 0.25em; color: rgba(245,242,236,0.3); z-index: 5; }
</style>
</head>
<body>
<div class="rm">
  <div class="corner tl"></div>

  <div class="cell b-hero">
    <div>
      <div class="eyebrow">IN PROGRESS · 進行中</div>
      <div class="hair-lg"></div>
      <h1>預約諮詢，<br/>下一步一起想。</h1>
      <p class="sub">你說的我們聽到了。挑出三個時段，你選一個方便的。</p>
    </div>
    <div class="b-status"><span class="dot"></span><span class="text">CONSULTATION · OPEN</span></div>
  </div>

  <div class="cell">
    <div class="num">02</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="14" y="20" width="52" height="46" rx="2"/><line x1="14" y1="32" x2="66" y2="32"/>
      <line x1="24" y1="14" x2="24" y2="24"/><line x1="56" y1="14" x2="56" y2="24"/>
    </svg>
    <div class="title">追蹤進度</div>
    <div class="en">PROJECT STATUS</div>
  </div>

  <div class="cell">
    <div class="num">03</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="16" y="14" width="42" height="52"/>
      <line x1="24" y1="26" x2="50" y2="26"/><line x1="24" y1="36" x2="42" y2="36"/>
      <line x1="24" y1="46" x2="50" y2="46"/><line x1="24" y1="56" x2="38" y2="56"/>
    </svg>
    <div class="title">看看報價</div>
    <div class="en">ESTIMATE</div>
  </div>

  <div class="cell">
    <div class="num">04</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="40" cy="40" r="22"/><path d="M40 28 v12 l10 6"/>
    </svg>
    <div class="title">優化建議</div>
    <div class="en">SUGGESTIONS</div>
  </div>

  <div class="cell">
    <div class="num">05</div>
    <svg class="ic" viewBox="0 0 80 80" fill="none" stroke="#B8924A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="40" cy="32" r="10"/>
      <path d="M20 64 C 20 52, 28 46, 40 46 C 52 46, 60 52, 60 64"/>
    </svg>
    <div class="title">聯絡顧問</div>
    <div class="en">YOUR ADVISOR</div>
  </div>

  <div class="brand">3Q · IN PROGRESS</div>
  <div class="corner br"></div>
</div>
</body>
</html>
