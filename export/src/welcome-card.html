<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <title>3Q · Welcome Card · 1040×1040</title>
  <meta name="ext-resource-dependency" content="./assets/photography/envelope-flat.svg" data-resource-id="envelope"/>

  <template id="__bundler_thumbnail" data-bg-color="#F5F2EC">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#F5F2EC"/>
      <rect x="40" y="40" width="120" height="60" fill="#E5DCC5" stroke="#B8924A" stroke-width="0.5"/>
      <line x1="80" y1="120" x2="120" y2="120" stroke="#B8924A" stroke-width="1"/>
      <text x="100" y="148" text-anchor="middle" font-family="Georgia, serif" font-weight="300"
            font-size="12" fill="#0A0A0A" letter-spacing="3">WELCOME</text>
      <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-weight="300"
            font-size="10" fill="#0A0A0A">3Q 孵化所</text>
    </svg>
  </template>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #F5F2EC;
      font-family: "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 1040px;
      height: 1040px;
      background: #F5F2EC;
      display: grid;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
    }

    .photo {
      background-size: cover;
      background-position: center;
    }

    .body {
      padding: 72px 64px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      align-items: center;
    }

    .eyebrow {
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #B8924A;
    }

    .hairline {
      width: 40px;
      height: 1px;
      background: #B8924A;
      margin: 24px auto;
    }

    h1 {
      font-family: "Noto Serif TC", "Cormorant Garamond", "Georgia", serif;
      font-weight: 300;
      font-size: 56px;
      line-height: 1.3;
      letter-spacing: 0.15em;
      color: #0A0A0A;
    }

    .sub {
      margin-top: 28px;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.8;
      letter-spacing: 0.05em;
      color: #1A1A1A;
      max-width: 720px;
    }

    .foot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .brand {
      font-family: "Noto Serif TC", serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.2em;
      color: #0A0A0A;
    }

    .lineid {
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #8A8A8A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="photo" id="photo"></div>
    <div class="body">
      <div>
        <div class="eyebrow">WELCOME</div>
        <div class="hairline"></div>
        <h1>只要你願意說，<br/>我們就幫你被看見。</h1>
        <p class="sub">
          不管你的需求、想法、產品 — 多大、多小、多複雜，<br/>
          我們都有適合的平台、舞台、後台。來，幫你圓夢。
        </p>
      </div>
      <div class="foot">
        <div class="brand">3Q貢丸</div>
        <div class="lineid">LINE · @121LKSPE</div>
      </div>
    </div>
  </div>

  <script>
    // After bundling, window.__resources.envelope will hold the inlined SVG URL.
    // Before bundling, fall back to the relative path for live preview.
    (function() {
      const photo = document.getElementById('photo');
      const url = (window.__resources && window.__resources.envelope) || './assets/photography/envelope-flat.svg';
      photo.style.backgroundImage = 'url(' + url + ')';
    })();
  </script>
</body>
</html>
