<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=2500, initial-scale=1"/>
  <title>3Q 孵化所 · Rich Menu 匯出 (2500×1686)</title>

  <meta name="ext-resource-dependency" content="../../assets/photography/cupped-palm-light.svg" data-resource-id="ph_palm"/>
  <meta name="ext-resource-dependency" content="../../assets/icons/consultation.svg"            data-resource-id="ic_consultation"/>
  <meta name="ext-resource-dependency" content="../../assets/icons/camera.svg"                  data-resource-id="ic_camera"/>
  <meta name="ext-resource-dependency" content="../../assets/icons/compass.svg"                 data-resource-id="ic_compass"/>
  <meta name="ext-resource-dependency" content="../../assets/icons/clock.svg"                   data-resource-id="ic_clock"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"/>
  <link rel="stylesheet" href="../../colors_and_type.css"/>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #1A1612; font-family: var(--font-sans); color: var(--color-paper); }
    /* RichMenu is huge (2500x1686). Stage allows horizontal scroll. */
    .stage { min-height: 100vh; padding: 48px; display: flex; justify-content: center; align-items: center; }
    #card { width: 2500px; height: 1686px; box-shadow: 0 30px 80px rgba(0,0,0,0.45); flex: 0 0 auto; }

    .toolbar { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; font-size: 12px; letter-spacing: 0.15em; flex-wrap: wrap; max-width: calc(100vw - 40px); justify-content: flex-end; }
    .toolbar button, .toolbar a {
      background: var(--color-paper); color: var(--color-black);
      border: 1px solid var(--color-gold); padding: 10px 18px;
      font-family: var(--font-sans); font-weight: 400; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .toolbar button:hover, .toolbar a:hover { background: var(--color-gold); color: var(--color-paper); }
    .toolbar .status { padding: 10px 14px; color: var(--color-gold); border: 1px dashed rgba(184,146,74,0.4); }
    .toolbar.hidden { display: none; }
    @media print { body { background: white; } .stage { padding: 0; min-height: auto; } #card { box-shadow: none; } .toolbar { display: none !important; } }
    body.bare { background: transparent; }
    body.bare .stage { padding: 0; min-height: 1686px; }
    body.bare #card { box-shadow: none; }

    /* ?scale=0.4 fits 2500 into a 1000px viewport for screen preview (PNG still 1:1) */
    .scaled #card { transform: scale(var(--preview-scale, 0.4)); transform-origin: top left; }
    .scaled .stage { padding: 24px; display: block; }
    .scaled .stage::after { content: ''; display: block; width: calc(2500px * var(--preview-scale, 0.4)); height: calc(1686px * var(--preview-scale, 0.4)); }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <span class="status" id="status">載入中…</span>
    <button id="downloadBtn" disabled>⬇ 下載 PNG (2500×1686)</button>
    <a href="?scale=0.4">縮小預覽 40%</a>
    <a href="?scale=1">原寸</a>
    <a href="launch.html">← launch.html</a>
  </div>

  <main class="stage">
    <div id="card"></div>
  </main>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>

  <script>
    window.__resources = {};
    document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(m => {
      window.__resources[m.getAttribute('data-resource-id')] = m.getAttribute('content');
    });
    var qs = new URLSearchParams(location.search);
    if (qs.get('bare') === '1') document.body.classList.add('bare');
    if (qs.get('clean') === '1' || qs.get('bare') === '1') document.getElementById('toolbar').classList.add('hidden');
    var scale = parseFloat(qs.get('scale') || '0');
    if (scale > 0 && scale < 1) {
      document.body.classList.add('scaled');
      document.documentElement.style.setProperty('--preview-scale', scale);
    }
  </script>

  <script type="text/babel" src="RichMenu.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<RichMenu width={2500} />);

    async function whenReady() {
      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }
      // Preload palm photo + 4 icons
      const urls = [
        window.__resources.ph_palm,
        window.__resources.ic_consultation,
        window.__resources.ic_camera,
        window.__resources.ic_compass,
        window.__resources.ic_clock,
      ];
      await Promise.all(urls.map(src => new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = src;
      })));
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    }

    async function exportPNG() {
      const btn = document.getElementById('downloadBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '匯出中… (大圖約 5-10 秒)';

      // Temporarily un-scale for accurate capture if preview scaling is active
      const wasScaled = document.body.classList.contains('scaled');
      if (wasScaled) document.body.classList.remove('scaled');
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      const canvas = await html2canvas(document.getElementById('card'), {
        width: 2500, height: 1686, scale: 1, backgroundColor: null, useCORS: true, logging: false,
      });
      await new Promise(resolve => {
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = '3q-richmenu-2500x1686.png';
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          resolve();
        }, 'image/png');
      });

      if (wasScaled) document.body.classList.add('scaled');
      status.textContent = '✓ 已下載';
      btn.disabled = false;
    }

    whenReady().then(() => {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = false;
      btn.addEventListener('click', exportPNG);
      document.getElementById('status').textContent = '就緒 · 2500×1686';
      window.__richmenuReady = true;
      if (qs.get('download') === '1') setTimeout(exportPNG, 500);
    });
  </script>
</body>
</html>
