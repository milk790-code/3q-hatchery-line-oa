<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1040, initial-scale=1"/>
  <title>3Q 孵化所 · Carousel Card 匯出 (1040×1040)</title>

  <meta name="ext-resource-dependency" content="../../assets/photography/still-bowl-rice.svg" data-resource-id="ph_bowl"/>
  <meta name="ext-resource-dependency" content="../../assets/photography/ink-stone.svg"      data-resource-id="ph_ink"/>
  <meta name="ext-resource-dependency" content="../../assets/photography/raw-linen.svg"      data-resource-id="ph_linen"/>
  <meta name="ext-resource-dependency" content="../../assets/photography/rice-stalk.svg"     data-resource-id="ph_stalk"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"/>
  <link rel="stylesheet" href="../../colors_and_type.css"/>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #1A1612; font-family: var(--font-sans); color: var(--color-paper); }
    .stage { min-height: 100vh; display: grid; place-items: center; padding: 48px; }
    #card { width: 1040px; height: 1040px; box-shadow: 0 30px 80px rgba(0,0,0,0.45); }

    .toolbar { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; font-size: 12px; letter-spacing: 0.15em; flex-wrap: wrap; max-width: calc(100vw - 40px); justify-content: flex-end; }
    .toolbar button, .toolbar a, .toolbar select {
      background: var(--color-paper); color: var(--color-black);
      border: 1px solid var(--color-gold); padding: 10px 18px;
      font-family: var(--font-sans); font-weight: 400; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .toolbar button:hover, .toolbar a:hover { background: var(--color-gold); color: var(--color-paper); }
    .toolbar .status { padding: 10px 14px; color: var(--color-gold); border: 1px dashed rgba(184,146,74,0.4); }
    .toolbar .quick { display: flex; gap: 4px; }
    .toolbar .quick a { padding: 10px 12px; }
    .toolbar .quick a.active { background: var(--color-gold); color: var(--color-paper); }
    .toolbar.hidden { display: none; }
    @media print { body { background: white; } .stage { padding: 0; min-height: auto; } #card { box-shadow: none; } .toolbar { display: none !important; } }
    body.bare { background: transparent; }
    body.bare .stage { padding: 0; min-height: 1040px; }
    body.bare #card { box-shadow: none; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <span class="status" id="status">載入中…</span>
    <div class="quick" id="cardLinks"></div>
    <button id="downloadBtn" disabled>⬇ 下載 PNG</button>
    <a href="launch.html">← launch.html</a>
  </div>

  <main class="stage">
    <div id="card"></div>
  </main>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>

  <script>
    window.__resources = {};
    document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(m => {
      window.__resources[m.getAttribute('data-resource-id')] = m.getAttribute('content');
    });
    var qs = new URLSearchParams(location.search);
    if (qs.get('bare') === '1') document.body.classList.add('bare');
    if (qs.get('clean') === '1' || qs.get('bare') === '1') document.getElementById('toolbar').classList.add('hidden');
  </script>

  <script type="text/babel" src="Carousel.jsx"></script>

  <script type="text/babel">
    // 4-card series — keep in sync with Carousel.jsx items.
    const items = [
      { id: 1, photo: window.__resources.ph_bowl,  eyebrow: 'NO. 01', title: '本月入駐\n阿婆ㄟ切仔麵店', meta: 'YUNLIN · 2026' },
      { id: 2, photo: window.__resources.ph_ink,   eyebrow: 'NO. 02', title: '好物\n值得好照',          meta: '好物・好照 · FROM 500' },
      { id: 3, photo: window.__resources.ph_stalk, eyebrow: 'NO. 03', title: '一束稻\n一個故事',        meta: 'TAINAN · 工坊' },
      { id: 4, photo: window.__resources.ph_linen, eyebrow: 'NO. 04', title: '原麻布\n沒被命名的好',    meta: 'WEAVERS · 鹿港' },
    ];

    const cardN = Math.max(1, Math.min(4, parseInt(qs.get('card') || '1', 10) || 1));
    const item = items[cardN - 1];

    // Build quick switch links
    const linksHost = document.getElementById('cardLinks');
    items.forEach(it => {
      const a = document.createElement('a');
      a.href = '?card=' + it.id + (qs.get('bare') === '1' ? '&bare=1' : '');
      a.textContent = String(it.id).padStart(2, '0');
      if (it.id === cardN) a.className = 'active';
      linksHost.appendChild(a);
    });

    const titleNode = <span>{item.title.split('\n').map((l, j) => <span key={j} style={{ display: 'block' }}>{l}</span>)}</span>;

    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<CarouselCard width={1040} photo={item.photo} eyebrow={item.eyebrow} title={titleNode} meta={item.meta} />);

    async function whenReady() {
      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }
      await new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = item.photo;
      });
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    }

    async function exportPNG() {
      const btn = document.getElementById('downloadBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '匯出中…';

      const canvas = await html2canvas(document.getElementById('card'), {
        width: 1040, height: 1040, scale: 1, backgroundColor: null, useCORS: true, logging: false,
      });
      await new Promise(resolve => {
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `3q-carousel-${String(cardN).padStart(2,'0')}-1040.png`;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          resolve();
        }, 'image/png');
      });

      status.textContent = '✓ 已下載';
      btn.disabled = false;
    }

    whenReady().then(() => {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = false;
      btn.addEventListener('click', exportPNG);
      document.getElementById('status').textContent = `就緒 · Card ${String(cardN).padStart(2,'0')} · 1040×1040`;
      window.__carouselReady = true;
      if (qs.get('download') === '1') setTimeout(exportPNG, 500);
    });
  </script>
</body>
</html>
