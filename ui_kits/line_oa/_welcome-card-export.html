<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1040, initial-scale=1"/>
  <title>3Q 孵化所 · Welcome Card 匯出 (1040×1040)</title>

  <meta name="ext-resource-dependency" content="../../assets/photography/envelope-flat.svg" data-resource-id="ph_envelope"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"/>
  <link rel="stylesheet" href="../../colors_and_type.css"/>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #1A1612;
      font-family: var(--font-sans);
      color: var(--color-paper);
    }

    /* Stage centers the 1040×1040 card with a small breathing margin in screen mode. */
    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px;
    }

    /* The card mount — exactly 1040×1040, no transforms, ready for screenshot. */
    #card {
      width: 1040px;
      height: 1040px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }

    /* Floating toolbar — hidden in print and when ?clean=1 */
    .toolbar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
      font-size: 12px;
      letter-spacing: 0.15em;
    }
    .toolbar button, .toolbar a {
      background: var(--color-paper);
      color: var(--color-black);
      border: 1px solid var(--color-gold);
      padding: 10px 18px;
      font-family: var(--font-sans);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .toolbar button:hover, .toolbar a:hover { background: var(--color-gold); color: var(--color-paper); }
    .toolbar .status {
      padding: 10px 14px;
      color: var(--color-gold);
      border: 1px dashed rgba(184,146,74,0.4);
    }
    .toolbar.hidden { display: none; }

    @media print {
      body { background: white; }
      .stage { padding: 0; min-height: auto; }
      #card { box-shadow: none; }
      .toolbar { display: none !important; }
    }

    /* When the page is loaded into a print/export context with ?bare=1, drop everything but the card. */
    body.bare { background: transparent; }
    body.bare .stage { padding: 0; min-height: 1040px; }
    body.bare #card { box-shadow: none; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <span class="status" id="status">載入中…</span>
    <button id="downloadBtn" disabled>⬇ 下載 PNG (1040×1040)</button>
    <a href="launch.html">← 回到 launch.html</a>
  </div>

  <main class="stage">
    <div id="card"></div>
  </main>

  <!-- React + Babel (same versions as launch.html) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- html2canvas for PNG export -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>

  <script>
    // Resolve ext-resource-dependency meta tags into window.__resources
    window.__resources = {};
    document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function(m) {
      var id  = m.getAttribute('data-resource-id');
      var url = m.getAttribute('content');
      if (id) window.__resources[id] = url;
    });

    // Query flags: ?download=1 auto-triggers PNG; ?bare=1 drops chrome; ?clean=1 hides toolbar
    var qs = new URLSearchParams(location.search);
    if (qs.get('bare') === '1') document.body.classList.add('bare');
    if (qs.get('clean') === '1' || qs.get('bare') === '1') document.getElementById('toolbar').classList.add('hidden');
  </script>

  <!-- Render the shared WelcomeCard component -->
  <script type="text/babel" src="WelcomeCard.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<WelcomeCard width={1040} />);

    // Wait for fonts + envelope SVG to actually paint before declaring ready.
    async function whenReady() {
      // Fonts
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) { /* fonts blocked — fall back */ }
      }
      // Envelope photo
      await new Promise((resolve) => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = window.__resources.ph_envelope;
      });
      // One paint cycle
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    }

    async function exportPNG() {
      const btn = document.getElementById('downloadBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '匯出中…';

      const card = document.getElementById('card');
      const canvas = await html2canvas(card, {
        width: 1040,
        height: 1040,
        scale: 1,
        backgroundColor: null,
        useCORS: true,
        logging: false,
      });

      await new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = '3q-welcome-card-1040.png';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          resolve();
        }, 'image/png');
      });

      status.textContent = '✓ 已下載';
      btn.disabled = false;
    }

    whenReady().then(() => {
      const btn = document.getElementById('downloadBtn');
      const status = document.getElementById('status');
      btn.disabled = false;
      btn.addEventListener('click', exportPNG);
      status.textContent = '就緒 · 1040×1040';

      // Headless flag — let Playwright / CI detect "ready to screenshot"
      window.__welcomeCardReady = true;

      // Auto-trigger download if ?download=1
      if (qs.get('download') === '1') {
        setTimeout(() => exportPNG(), 500);
      }
    });
  </script>
</body>
</html>
